function drawBoss(sx, y, e) {
  const flash = e.hitFlash > 0;
  const telegraph = e.phase === 'telegraph';
  const slamming = e.phase === 'slam';
  const facing = player.x < e.x ? -1 : 1;
  const now = Date.now() * 0.005;
  const pulse = 0.7 + 0.3 * Math.sin(now * 2);
  // During the outro the boss sparks/glitches.
  const dying = bossOutroTimer > 0;

  ctx.save();

  // Heavy ground shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 3, 60, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Legs - twin hydraulic pistons
  ctx.fillStyle = flash ? '#ffffff' : '#0f0a18';
  ctx.fillRect(sx - 30, y - 38, 20, 38);
  ctx.fillRect(sx + 10, y - 38, 20, 38);
  // Knee hydraulics
  ctx.fillStyle = flash ? '#ffffff' : '#3a2a4a';
  ctx.fillRect(sx - 28, y - 32, 16, 4);
  ctx.fillRect(sx + 12, y - 32, 16, 4);
  ctx.fillRect(sx - 28, y - 18, 16, 4);
  ctx.fillRect(sx + 12, y - 18, 16, 4);
  // Feet pads
  ctx.fillStyle = flash ? '#ffffff' : '#05030a';
  ctx.fillRect(sx - 34, y - 4, 26, 6);
  ctx.fillRect(sx + 8,  y - 4, 26, 6);

  // Torso - massive armored chassis
  ctx.fillStyle = flash ? '#ffffff' : '#3a1450';
  ctx.fillRect(sx - 44, y - 96, 88, 60);
  ctx.fillStyle = flash ? '#ffffff' : '#5a1a78';
  ctx.fillRect(sx - 42, y - 94, 84, 8); // top highlight
  // Torso magenta neon seams
  ctx.fillStyle = flash ? '#ffffff' : '#ff2aa0';
  ctx.globalAlpha = 0.85;
  ctx.fillRect(sx - 44, y - 60, 88, 2);
  ctx.fillRect(sx - 44, y - 38, 88, 2);
  ctx.globalAlpha = 1;

  // Reactor core - pulsing when telegraphing
  const coreColor = telegraph ? `rgba(255, 204, 0, ${0.7 + 0.3 * Math.sin(now * 8)})`
                              : `rgba(255, 80, 210, ${pulse})`;
  ctx.fillStyle = flash ? '#ffffff' : coreColor;
  ctx.fillRect(sx - 14, y - 82, 28, 28);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(sx - 8, y - 78, 4, 20);
  ctx.fillRect(sx + 4, y - 78, 4, 20);
  // Core frame
  ctx.strokeStyle = flash ? '#ffffff' : '#ff2aa0';
  ctx.lineWidth = 2;
  ctx.strokeRect(sx - 14, y - 82, 28, 28);
  ctx.lineWidth = 1;

  // Shoulder pauldrons with spikes
  ctx.fillStyle = flash ? '#ffffff' : '#2a0c3a';
  ctx.fillRect(sx - 58, y - 96, 14, 26);
  ctx.fillRect(sx + 44, y - 96, 14, 26);
  ctx.fillStyle = flash ? '#ffffff' : '#ff2aa0';
  ctx.fillRect(sx - 58, y - 96, 14, 3);
  ctx.fillRect(sx + 44, y - 96, 14, 3);
  // Spikes
  ctx.fillStyle = flash ? '#ffffff' : '#cccccc';
  for (let i = 0; i < 3; i++) {
    ctx.fillRect(sx - 56 + i * 4, y - 102 - i * 2, 2, 6 + i * 2);
    ctx.fillRect(sx + 46 + i * 4, y - 102 - (2 - i) * 2, 2, 6 + (2 - i) * 2);
  }

  // Arms with cannons
  ctx.fillStyle = flash ? '#ffffff' : '#1a0c26';
  ctx.fillRect(sx - 66, y - 72, 12, 30);
  ctx.fillRect(sx + 54, y - 72, 12, 30);
  // Elbow joints
  ctx.fillStyle = flash ? '#ffffff' : '#4a2a5a';
  ctx.fillRect(sx - 66, y - 62, 12, 4);
  ctx.fillRect(sx + 54, y - 62, 12, 4);
  // Cannon barrels (longer during telegraph to sell the windup)
  const barrelExt = telegraph ? 8 : 0;
  ctx.fillStyle = flash ? '#ffffff' : '#111';
  ctx.fillRect(sx - 74 - barrelExt, y - 48, 18 + barrelExt, 10);
  ctx.fillRect(sx + 56, y - 48, 18 + barrelExt, 10);
  // Muzzle glow
  ctx.fillStyle = flash ? '#ffffff' : (telegraph ? '#ffee66' : '#ff2aa0');
  ctx.fillRect(sx - 76 - barrelExt, y - 46, 3, 6);
  ctx.fillRect(sx + 72 + barrelExt, y - 46, 3, 6);

  // Head - single-visor skull
  ctx.fillStyle = flash ? '#ffffff' : '#2a0c3a';
  ctx.fillRect(sx - 22, y - 124, 44, 28);
  ctx.fillStyle = flash ? '#ffffff' : '#4a1a58';
  ctx.fillRect(sx - 24, y - 118, 48, 6);
  // Visor - glowing slit
  const visorColor = slamming ? '#ffee66' : (dying ? '#5588ff' : '#ff2aa0');
  ctx.fillStyle = flash ? '#ffffff' : visorColor;
  ctx.fillRect(sx - 18, y - 112, 36, 6);
  // Horn crown
  ctx.fillStyle = flash ? '#ffffff' : '#cccccc';
  ctx.fillRect(sx - 16, y - 132, 4, 10);
  ctx.fillRect(sx - 4,  y - 136, 4, 12);
  ctx.fillRect(sx + 8,  y - 132, 4, 10);
  // Antenna with warning light
  ctx.fillStyle = '#888';
  ctx.fillRect(sx + 14, y - 140, 2, 8);
  ctx.fillStyle = (Math.floor(Date.now() / 250) % 2) ? '#ff3333' : '#550000';
  ctx.fillRect(sx + 12, y - 143, 6, 4);

  // Dying glitch: random spark rectangles
  if (dying) {
    for (let i = 0; i < 6; i++) {
      ctx.fillStyle = Math.random() < 0.5 ? '#ffee66' : '#ff2aa0';
      ctx.fillRect(sx - 40 + Math.random() * 80, y - 120 + Math.random() * 100, 3, 3);
    }
  }

  // Facing-direction indicator: subtle side panel highlight on the tracking side.
  if (!dying) {
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ff2aa0';
    if (facing < 0) ctx.fillRect(sx - 44, y - 94, 4, 56);
    else ctx.fillRect(sx + 40, y - 94, 4, 56);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawBossProjectiles() {
  if (bossProjectiles.length === 0) return;
  for (const p of bossProjectiles) {
    const sx = p.x - camX;

    // --- Explosion phase ---
    if (p.exploding) {
      const t = 1 - (p.explodeTimer / p.explodeMaxTimer); // 0 -> 1
      const r = p.explodeRadius * Math.min(1, t * 1.4);
      // Outer fiery ring
      ctx.fillStyle = `rgba(255, 80, 40, ${0.55 * (1 - t)})`;
      ctx.beginPath();
      ctx.arc(sx, p.y, r, 0, Math.PI * 2);
      ctx.fill();
      // Middle yellow-orange core
      ctx.fillStyle = `rgba(255, 220, 80, ${0.75 * (1 - t)})`;
      ctx.beginPath();
      ctx.arc(sx, p.y, r * 0.6, 0, Math.PI * 2);
      ctx.fill();
      // Hot white center
      ctx.fillStyle = `rgba(255, 255, 255, ${0.9 * (1 - t)})`;
      ctx.beginPath();
      ctx.arc(sx, p.y, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
      // Shockwave ring outline
      ctx.strokeStyle = `rgba(255, 204, 80, ${0.8 * (1 - t)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, p.y, r * 1.05, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
      // Debris sparks
      for (let k = 0; k < 8; k++) {
        const a = (k / 8) * Math.PI * 2 + t * 1.2;
        const dr = r * 0.9;
        ctx.fillStyle = `rgba(255, 180, 60, ${1 - t})`;
        ctx.fillRect(sx + Math.cos(a) * dr - 1, p.y + Math.sin(a) * dr - 1, 2, 2);
      }
      continue;
    }

    // --- Rocket in flight ---
    const ang = p.angle || Math.atan2(p.vy, p.vx);
    ctx.save();
    ctx.translate(sx, p.y);
    ctx.rotate(ang);

    // Exhaust flame behind rocket - flickering orange/yellow plume
    const flameLen = 14 + Math.sin(Date.now() * 0.05) * 3;
    ctx.fillStyle = 'rgba(255, 140, 40, 0.75)';
    ctx.beginPath();
    ctx.moveTo(-6, -4);
    ctx.lineTo(-6 - flameLen, 0);
    ctx.lineTo(-6, 4);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 230, 120, 0.9)';
    ctx.beginPath();
    ctx.moveTo(-6, -2);
    ctx.lineTo(-6 - flameLen * 0.7, 0);
    ctx.lineTo(-6, 2);
    ctx.closePath();
    ctx.fill();

    // Rocket body - metallic magenta chassis
    ctx.fillStyle = '#3a1030';
    ctx.fillRect(-8, -4, 14, 8);
    ctx.fillStyle = '#ff2aa0';
    ctx.fillRect(-8, -4, 14, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-4, -1, 8, 2);
    // Nose cone
    ctx.fillStyle = '#ffee66';
    ctx.beginPath();
    ctx.moveTo(6, -4);
    ctx.lineTo(12, 0);
    ctx.lineTo(6, 4);
    ctx.closePath();
    ctx.fill();
    // Fins
    ctx.fillStyle = '#ff2aa0';
    ctx.fillRect(-8, -6, 3, 2);
    ctx.fillRect(-8, 4,  3, 2);
    // Blinking guidance light pulse (faster as lifetime elapses)
    const pulseRate = 0.012 + (1 - p.life / p.maxLife) * 0.03;
    const blink = Math.sin(Date.now() * pulseRate * 10) > 0;
    if (blink) {
      ctx.fillStyle = '#ff2a2a';
      ctx.fillRect(-1, -1, 2, 2);
    }

    ctx.restore();

    // Soft glow halo (draw in world space, not rotated)
    ctx.fillStyle = 'rgba(255, 80, 200, 0.2)';
    ctx.beginPath();
    ctx.arc(sx, p.y, 11, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBossHPBar() {
  if (!bossActive || !boss) return;
  // Positioned just below the HUD strip (y = 0..56) so it is never occluded.
  const barW = 620;
  const barH = 22;
  const panelX = (UI_W - (barW + 24)) / 2;
  const panelY = 64;
  const x = panelX + 12;
  const y = panelY + 22;

  // Panel with neon border
  ctx.fillStyle = 'rgba(10, 4, 18, 0.92)';
  ctx.fillRect(panelX, panelY, barW + 24, barH + 34);
  ctx.strokeStyle = '#ff2aa0';
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX, panelY, barW + 24, barH + 34);
  ctx.lineWidth = 1;

  // Label with subtle glow
  ctx.save();
  ctx.shadowColor = '#ff2aa0';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#ffee66';
  ctx.font = 'bold 13px Consolas, "Courier New", monospace';
  ctx.fillText('MEGA-CORP TITAN', x, y - 6);
  ctx.restore();

  // Bar backdrop
  ctx.fillStyle = '#200614';
  ctx.fillRect(x, y, barW, barH);
  // Fill
  const ratio = Math.max(0, boss.hp / boss.maxHp);
  const grad = ctx.createLinearGradient(x, y, x + barW, y);
  grad.addColorStop(0, '#ff2aa0');
  grad.addColorStop(0.5, '#ff6ac0');
  grad.addColorStop(1, '#ffee66');
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, Math.round(barW * ratio), barH);
  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(x, y + 2, Math.round(barW * ratio), 4);
  // Segment ticks
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  for (let i = 1; i < 10; i++) {
    const tx = x + (barW / 10) * i;
    ctx.beginPath();
    ctx.moveTo(tx, y);
    ctx.lineTo(tx, y + barH);
    ctx.stroke();
  }
  // Frame around bar
  ctx.strokeStyle = '#ff2aa0';
  ctx.strokeRect(x, y, barW, barH);
  // HP text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px Consolas, "Courier New", monospace';
  const hpText = `${Math.max(0, boss.hp)} / ${boss.maxHp}`;
  ctx.fillText(hpText, x + barW - ctx.measureText(hpText).width - 6, y + 15);
}

function drawPoisonHazards() {
  if (poisonSources.length === 0 && poisonDrops.length === 0) return;
  const now = Date.now() * 0.004;

  // Ceiling drippers - rusty pipe nozzle with a bulging acid droplet on the tip.
  for (const src of poisonSources) {
    const sx = src.x - camX;
    if (sx < -30 || sx > GAME_W + 30) continue;
    // Stalactite/nozzle
    ctx.fillStyle = '#2a2418';
    ctx.fillRect(sx - 5, src.y - 12, 10, 10);
    ctx.fillStyle = '#3a3020';
    ctx.fillRect(sx - 4, src.y - 11, 8, 4);
    // Rust ring
    ctx.fillStyle = '#6a3a20';
    ctx.fillRect(sx - 5, src.y - 3, 10, 2);
    // Swelling droplet at the tip (pulses with timer approach)
    const wobble = 1 + Math.sin(now + src.wobble) * 0.5;
    const rad = 2.2 + Math.max(0, 1.8 - src.timer / 40) + wobble * 0.3;
    ctx.fillStyle = '#5cff80';
    ctx.beginPath();
    ctx.arc(sx, src.y + 2, rad, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(140, 255, 120, 0.4)';
    ctx.beginPath();
    ctx.arc(sx, src.y + 2, rad + 1.4, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = '#d6ffd0';
    ctx.fillRect(sx - 1, src.y + 1, 1, 1);
  }

  // Falling acid droplets - tear-drop shape with trailing glow.
  for (const d of poisonDrops) {
    const sx = d.x - camX;
    if (sx < -20 || sx > GAME_W + 20) continue;
    // Glow trail
    ctx.fillStyle = 'rgba(92, 255, 128, 0.28)';
    ctx.beginPath();
    ctx.ellipse(sx, d.y - 8, 3, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    // Teardrop body
    ctx.fillStyle = '#5cff80';
    ctx.beginPath();
    ctx.moveTo(sx, d.y - 7);
    ctx.quadraticCurveTo(sx - 4, d.y - 2, sx - 3, d.y + 2);
    ctx.quadraticCurveTo(sx, d.y + 6, sx + 3, d.y + 2);
    ctx.quadraticCurveTo(sx + 4, d.y - 2, sx, d.y - 7);
    ctx.closePath();
    ctx.fill();
    // Inner highlight
    ctx.fillStyle = '#d6ffd0';
    ctx.fillRect(sx - 1, d.y - 3, 1, 2);
  }
}

function drawFlag() {
  const sx = player.goalX - camX;
  ctx.fillStyle = '#666';
  ctx.fillRect(sx, 360, 6, 88);
  ctx.fillStyle = '#39ff14';
  ctx.fillRect(sx + 6, 360, 30, 20);
  ctx.fillStyle = '#ff00ff';
  ctx.fillRect(sx + 12, 364, 20, 12);
}

function drawBackground() {
  if (currentLevel === 5) {
    drawCyberCityBackground();
    return;
  }
  if (currentLevel === 4) {
    drawSewerBackground();
    return;
  }
  if (currentLevel === 3) {
    drawJunkyardBackground();
    return;
  }
  if (currentLevel === 2) {
    drawVillageBackground();
    return;
  }
  // Dark night sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#0a0812');
  grad.addColorStop(0.4, '#12101a');
  grad.addColorStop(1, '#1a1520');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Subtle stars
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  for (let i = 0; i < 40; i++) {
    const sx = (i * 173 + camX * 0.05) % GAME_W;
    const sy = (i * 89) % 280;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Buildings
  const buildingColors = ['#12101a', '#15181f', '#0f1218', '#181622'];
  const warmLights = ['#ff9944', '#ffbb66', '#eeaa55', '#dd8833'];

  for (let i = 0; i < 20; i++) {
    const bx = (i * 120 - camX * 0.3) % 900 - 50;
    const bh = 80 + (i * 37) % 120;
    ctx.fillStyle = buildingColors[i % buildingColors.length];
    ctx.fillRect(bx, GAME_H - bh, 80, bh);
    ctx.fillStyle = '#1a1a25';
    ctx.fillRect(bx + 4, GAME_H - bh + 4, 72, bh - 4);

    ctx.fillStyle = warmLights[i % warmLights.length];
    ctx.globalAlpha = 0.3;
    for (let wy = GAME_H - bh + 12; wy < GAME_H - 15; wy += 22) {
      for (let wx = bx + 8; wx < bx + 72; wx += 18) {
        if ((i + wy) % 3 !== 0) ctx.fillRect(wx, wy, 6, 10);
      }
    }
    ctx.globalAlpha = 1;

    // A couple of brighter windows make the skyline feel more alive.
    const brightWindow1X = bx + 8 + ((i * 7) % 4) * 18;
    const brightWindow1Y = GAME_H - bh + 12 + ((i * 5) % 3) * 22;
    const brightWindow2X = bx + 8 + ((i * 11 + 2) % 4) * 18;
    const brightWindow2Y = GAME_H - bh + 12 + ((i * 3 + 1) % 3) * 22;

    ctx.fillStyle = '#ffd98a';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(brightWindow1X, brightWindow1Y, 6, 10);
    if (i % 2 === 0) ctx.fillRect(brightWindow2X, brightWindow2Y, 6, 10);

    ctx.fillStyle = '#fff1b8';
    ctx.globalAlpha = 0.28;
    ctx.fillRect(brightWindow1X - 1, brightWindow1Y - 1, 8, 12);
    if (i % 2 === 0) ctx.fillRect(brightWindow2X - 1, brightWindow2Y - 1, 8, 12);
    ctx.globalAlpha = 1;
  }
}

function drawJunkyardBackground() {
  // Smoggy polluted sky
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#302a1e');
  grad.addColorStop(0.4, '#3e3020');
  grad.addColorStop(1, '#1a140e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Hazy sun through smog
  ctx.fillStyle = 'rgba(220, 170, 80, 0.35)';
  ctx.beginPath();
  ctx.arc(580, 110, 50, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(220, 170, 80, 0.15)';
  ctx.beginPath();
  ctx.arc(580, 110, 80, 0, Math.PI * 2);
  ctx.fill();

  // Drifting smog clouds
  ctx.fillStyle = 'rgba(70, 60, 50, 0.4)';
  for (let i = 0; i < 10; i++) {
    const cx = (i * 180 - camX * 0.1) % 1000 - 120;
    const cy = 40 + (i * 31) % 60;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 70, 12, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Far crane silhouettes
  ctx.fillStyle = '#1a1612';
  for (let i = 0; i < 4; i++) {
    const cx = (i * 320 - camX * 0.2) % 1100 - 200;
    // Mast
    ctx.fillRect(cx, GAME_H - 260, 4, 180);
    // Arm
    ctx.fillRect(cx - 60, GAME_H - 260, 120, 4);
    // Hook chain
    ctx.fillRect(cx + 40, GAME_H - 256, 1, 30);
    ctx.fillRect(cx + 36, GAME_H - 226, 8, 8);
    // Counterweight
    ctx.fillRect(cx - 18, GAME_H - 256, 12, 12);
  }

  // Mid trash hills
  const hillColors = ['#2a2218', '#342820', '#1f1812'];
  for (let i = 0; i < 16; i++) {
    const hx = (i * 190 - camX * 0.35) % 1000 - 120;
    const hh = 70 + (i * 23) % 40;
    ctx.fillStyle = hillColors[i % hillColors.length];
    ctx.beginPath();
    ctx.moveTo(hx, GAME_H - 46);
    ctx.lineTo(hx + 60, GAME_H - 46 - hh);
    ctx.lineTo(hx + 180, GAME_H - 46);
    ctx.closePath();
    ctx.fill();
    // Junk bits sticking out
    ctx.fillStyle = '#555042';
    ctx.fillRect(hx + 40, GAME_H - 56 - hh * 0.6, 6, 10);
    ctx.fillStyle = '#6a4a2a';
    ctx.fillRect(hx + 90, GAME_H - 64 - hh * 0.4, 8, 14);
    ctx.fillStyle = '#3a6a3a';
    ctx.fillRect(hx + 130, GAME_H - 58 - hh * 0.7, 5, 12);
  }

  // Rusted shipping containers scattered behind gameplay
  const containerColors = ['#6a2a1a', '#5a3a1a', '#3a4a2a', '#6a6a2a'];
  for (let i = 0; i < 10; i++) {
    const bx = (i * 260 - camX * 0.55) % 1100 - 150;
    const bw = 110 + (i * 11) % 40;
    const bh = 60 + (i * 17) % 20;
    const by = GAME_H - bh - 46;
    ctx.fillStyle = containerColors[i % containerColors.length];
    ctx.fillRect(bx, by, bw, bh);
    // Ribbed panels
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (let r = bx + 6; r < bx + bw - 4; r += 10) {
      ctx.fillRect(r, by + 2, 2, bh - 4);
    }
    // Rust streaks
    ctx.fillStyle = 'rgba(180, 90, 40, 0.35)';
    ctx.fillRect(bx + 12, by + 10, 3, bh - 14);
    ctx.fillRect(bx + bw - 22, by + 6, 2, bh - 10);
    // Graffiti tag
    ctx.fillStyle = '#39ff14';
    ctx.font = 'bold 10px Consolas, "Courier New", monospace';
    ctx.fillText('PUNK', bx + 18, by + bh / 2 + 4);
  }

  // Burning barrels with smoke
  for (let i = 0; i < 6; i++) {
    const bx = (i * 340 - camX * 0.75) % 900 - 80;
    const by = GAME_H - 66;
    // Barrel body
    ctx.fillStyle = '#4a2818';
    ctx.fillRect(bx, by, 20, 28);
    ctx.fillStyle = '#2a1408';
    ctx.fillRect(bx, by, 20, 3);
    ctx.fillRect(bx, by + 25, 20, 3);
    // Flames
    const flicker = Math.sin(Date.now() * 0.02 + i) * 2;
    ctx.fillStyle = '#ff9a22';
    ctx.beginPath();
    ctx.moveTo(bx + 2,  by);
    ctx.lineTo(bx + 10, by - 14 - flicker);
    ctx.lineTo(bx + 18, by);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffd060';
    ctx.beginPath();
    ctx.moveTo(bx + 5,  by);
    ctx.lineTo(bx + 10, by - 8 - flicker);
    ctx.lineTo(bx + 15, by);
    ctx.closePath();
    ctx.fill();
    // Smoke
    ctx.fillStyle = 'rgba(80,70,60,0.35)';
    for (let s = 0; s < 3; s++) {
      ctx.beginPath();
      ctx.arc(bx + 10, by - 24 - s * 12 - flicker, 5 + s * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Foreground tire piles
  ctx.fillStyle = '#0e0a08';
  for (let i = 0; i < 8; i++) {
    const tx = (i * 230 - camX * 0.95) % 900 - 80;
    const ty = GAME_H - 52;
    for (let layer = 0; layer < 3; layer++) {
      for (let t = 0; t < 3 - layer; t++) {
        const cx = tx + t * 14 + layer * 7;
        const cy = ty - layer * 10;
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1a1412';
        ctx.beginPath();
        ctx.arc(cx, cy, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#0e0a08';
      }
    }
  }
}

function drawVillageBackground() {
  // Dusk / sunset sky
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0, '#2c1230');
  grad.addColorStop(0.45, '#5a2840');
  grad.addColorStop(1, '#1a1018');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Moon
  ctx.fillStyle = '#f5efd4';
  ctx.beginPath();
  ctx.arc(640, 80, 26, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(245, 239, 212, 0.18)';
  ctx.beginPath();
  ctx.arc(640, 80, 40, 0, Math.PI * 2);
  ctx.fill();

  // Scattered stars
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 197 + camX * 0.04) % GAME_W;
    const sy = (i * 73) % 180;
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Distant hills (far parallax)
  ctx.fillStyle = '#231830';
  for (let i = 0; i < 14; i++) {
    const hx = (i * 220 - camX * 0.15) % 1100 - 150;
    const hh = 60 + (i * 29) % 50;
    ctx.beginPath();
    ctx.moveTo(hx, GAME_H - 140);
    ctx.quadraticCurveTo(hx + 80, GAME_H - 140 - hh, hx + 180, GAME_H - 140);
    ctx.closePath();
    ctx.fill();
  }

  // Village cottages (mid parallax, behind gameplay)
  const roofColors = ['#1b1018', '#261420', '#1f1019'];
  const wallColors = ['#5a3628', '#4a2c20', '#6a4028'];
  for (let i = 0; i < 18; i++) {
    const bx = (i * 150 - camX * 0.35) % 1000 - 100;
    const bw = 72 + (i * 13) % 24;
    const bh = 58 + (i * 19) % 28;
    const by = GAME_H - bh - 46;

    // Wall
    ctx.fillStyle = wallColors[i % wallColors.length];
    ctx.fillRect(bx, by, bw, bh);
    // Wall planks (horizontal lines)
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let py = by + 10; py < by + bh - 2; py += 8) {
      ctx.fillRect(bx, py, bw, 1);
    }
    // Roof
    ctx.fillStyle = roofColors[i % roofColors.length];
    ctx.beginPath();
    ctx.moveTo(bx - 5, by);
    ctx.lineTo(bx + bw / 2, by - 26);
    ctx.lineTo(bx + bw + 5, by);
    ctx.closePath();
    ctx.fill();
    // Chimney
    ctx.fillStyle = '#2a1a18';
    ctx.fillRect(bx + bw - 18, by - 20, 8, 14);
    // Smoke puffs
    ctx.fillStyle = 'rgba(200,200,220,0.18)';
    const smokePhase = (Date.now() * 0.001 + i) % 3;
    for (let s = 0; s < 3; s++) {
      const sOff = (smokePhase + s) % 3;
      ctx.beginPath();
      ctx.arc(bx + bw - 14, by - 28 - sOff * 10, 4 + sOff * 2, 0, Math.PI * 2);
      ctx.fill();
    }
    // Warm windows
    ctx.fillStyle = '#ffbb5a';
    ctx.globalAlpha = 0.75;
    ctx.fillRect(bx + 10, by + 16, 14, 14);
    if (bw > 80) ctx.fillRect(bx + bw - 24, by + 16, 14, 14);
    // Window glow
    ctx.fillStyle = '#fff1b8';
    ctx.globalAlpha = 0.28;
    ctx.fillRect(bx + 8, by + 14, 18, 18);
    if (bw > 80) ctx.fillRect(bx + bw - 26, by + 14, 18, 18);
    ctx.globalAlpha = 1;
    // Door
    ctx.fillStyle = '#1d1014';
    ctx.fillRect(bx + bw / 2 - 6, by + bh - 22, 12, 22);
  }

  // Foreground grassy mound silhouettes
  ctx.fillStyle = '#15181a';
  for (let i = 0; i < 12; i++) {
    const mx = (i * 180 - camX * 0.55) % 900 - 100;
    ctx.beginPath();
    ctx.ellipse(mx, GAME_H - 44, 120, 30, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSewerBackground() {
  // Dank vertical tunnel gradient - black top, sickly green middle, brown sludge bottom.
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0,    '#060a08');
  grad.addColorStop(0.35, '#0c1410');
  grad.addColorStop(0.65, '#122018');
  grad.addColorStop(1,    '#1a1a10');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Tunnel arch silhouette (static, perspective)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, GAME_H - 50);
  ctx.quadraticCurveTo(GAME_W / 2, 60, GAME_W, GAME_H - 50);
  ctx.lineTo(GAME_W, 0);
  ctx.closePath();
  ctx.fill();

  // Far brick wall (deep parallax)
  const brickRows = 12;
  const brickW = 56;
  const brickH = 22;
  for (let row = 0; row < brickRows; row++) {
    const yy = 60 + row * brickH;
    const offset = (row % 2) * (brickW / 2);
    for (let col = -1; col < 18; col++) {
      const bx = ((col * brickW - camX * 0.15 + offset) % (GAME_W + brickW)) - brickW;
      const shade = 18 + ((row * 7 + col * 13) % 20);
      ctx.fillStyle = `rgb(${shade + 8}, ${shade + 4}, ${shade})`;
      ctx.fillRect(bx, yy, brickW - 2, brickH - 2);
      // Moss streak
      if ((row + col) % 5 === 0) {
        ctx.fillStyle = 'rgba(60, 120, 70, 0.25)';
        ctx.fillRect(bx, yy, brickW - 2, 3);
      }
    }
  }

  // Mid-ground pipes running along the back wall
  const pipeColors = ['#3a3028', '#4a3a30', '#2e2620'];
  for (let i = 0; i < 6; i++) {
    const py = 90 + i * 48;
    ctx.fillStyle = pipeColors[i % pipeColors.length];
    ctx.fillRect(0, py, GAME_W, 10);
    // Rivets along the pipe
    ctx.fillStyle = '#1a1410';
    for (let rx = 20 - (camX * 0.3) % 40; rx < GAME_W; rx += 40) {
      ctx.fillRect(rx, py + 2, 3, 3);
      ctx.fillRect(rx, py + 6, 3, 3);
    }
    // Valve handle every few pipes
    if (i % 2 === 0) {
      const vx = (180 + i * 260 - camX * 0.3) % (GAME_W + 120) - 60;
      ctx.fillStyle = '#5a4030';
      ctx.fillRect(vx - 2, py - 8, 4, 8);
      ctx.fillStyle = '#6a5040';
      ctx.beginPath();
      ctx.arc(vx, py - 12, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#2a1e18';
      for (let a = 0; a < 4; a++) {
        const ang = (a * Math.PI) / 2;
        ctx.fillRect(vx + Math.cos(ang) * 5 - 1, py - 12 + Math.sin(ang) * 5 - 1, 2, 2);
      }
    }
  }

  // Dripping water from pipes
  const drip = Date.now() * 0.001;
  ctx.fillStyle = 'rgba(120, 200, 220, 0.55)';
  for (let i = 0; i < 8; i++) {
    const dx = (i * 120 - camX * 0.4) % GAME_W;
    const baseY = 90 + ((i * 48) % 240);
    const dy = baseY + ((drip * 50 + i * 40) % 80);
    ctx.fillRect(dx, dy, 1, 4);
  }

  // Toxic green fumes rising from the floor (parallax, pulsating)
  const fumePhase = Date.now() * 0.0008;
  for (let i = 0; i < 14; i++) {
    const cx = (i * 140 - camX * 0.5) % (GAME_W + 160) - 80;
    const bob = Math.sin(fumePhase + i * 0.7) * 6;
    const cy = GAME_H - 80 + bob;
    const rad = 40 + Math.sin(fumePhase * 1.3 + i) * 8;
    const alpha = 0.18 + Math.sin(fumePhase * 2 + i) * 0.05;
    const fg = ctx.createRadialGradient(cx, cy, 2, cx, cy, rad);
    fg.addColorStop(0, `rgba(140, 255, 120, ${alpha + 0.08})`);
    fg.addColorStop(0.6, `rgba(80, 180, 80, ${alpha * 0.5})`);
    fg.addColorStop(1, 'rgba(60, 120, 60, 0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.arc(cx, cy, rad, 0, Math.PI * 2);
    ctx.fill();
  }

  // Sludge pool along the bottom
  ctx.fillStyle = '#1e2a14';
  ctx.fillRect(0, GAME_H - 46, GAME_W, 46);
  ctx.fillStyle = '#2a3c18';
  ctx.fillRect(0, GAME_H - 46, GAME_W, 4);
  // Toxic green shine on the sludge surface
  ctx.fillStyle = 'rgba(120, 255, 120, 0.25)';
  for (let i = 0; i < 30; i++) {
    const sx = (i * 70 - camX * 0.9 + Math.sin(fumePhase * 2 + i) * 6) % GAME_W;
    ctx.fillRect(sx, GAME_H - 44, 22, 1);
  }

  // Background rats scurrying along the far wall
  const ratPhase = Date.now() * 0.002;
  ctx.fillStyle = '#2a1e18';
  for (let i = 0; i < 6; i++) {
    const speed = 40 + (i % 3) * 15;
    const rx = ((ratPhase * speed + i * 230) % (GAME_W + 120)) - 60;
    const ry = GAME_H - 58 - (i % 2) * 4;
    // Body + tail
    ctx.fillRect(rx, ry, 8, 4);
    ctx.fillRect(rx + 2, ry - 2, 4, 2);
    ctx.fillStyle = '#ff2020';
    ctx.fillRect(rx + 6, ry - 1, 1, 1);
    ctx.fillStyle = '#2a1e18';
    ctx.fillRect(rx - 4, ry + 1, 4, 1);
  }

  // Foreground grate pillars
  ctx.fillStyle = '#0a0a08';
  for (let i = 0; i < 5; i++) {
    const px = (i * 220 - camX * 1.0) % (GAME_W + 240) - 120;
    ctx.fillRect(px, GAME_H - 90, 14, 44);
    // Rust highlights
    ctx.fillStyle = '#3a2418';
    ctx.fillRect(px + 1, GAME_H - 88, 2, 40);
    ctx.fillRect(px + 11, GAME_H - 88, 2, 40);
    ctx.fillStyle = '#0a0a08';
  }
}

function drawCyberCityBackground() {
  // Deep violet night sky with a horizon neon band.
  const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
  grad.addColorStop(0,    '#140820');
  grad.addColorStop(0.45, '#24103a');
  grad.addColorStop(0.65, '#3a1266');
  grad.addColorStop(0.8,  '#ff2aa0');
  grad.addColorStop(0.95, '#ff8a1a');
  grad.addColorStop(1,    '#1a0824');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  // Distant stars / parallax dots
  ctx.fillStyle = 'rgba(255, 230, 255, 0.45)';
  for (let i = 0; i < 80; i++) {
    const sx = (i * 127 + camX * 0.03) % GAME_W;
    const sy = (i * 53) % 220;
    if ((i * 7) % 5 === 0) {
      ctx.fillStyle = 'rgba(255, 240, 255, 0.65)';
    } else {
      ctx.fillStyle = 'rgba(180, 220, 255, 0.35)';
    }
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Far skyline - dark silhouettes of mega-skyscrapers, slow parallax
  const farColors = ['#0e0820', '#160e2a', '#1a0c30', '#0a0618'];
  for (let i = 0; i < 22; i++) {
    const bx = (i * 140 - camX * 0.12) % (GAME_W + 200) - 100;
    const bh = 130 + (i * 41) % 160;
    ctx.fillStyle = farColors[i % farColors.length];
    ctx.fillRect(bx, GAME_H - bh - 40, 100, bh);
    // Tiny windows - magenta + cyan dots. The lit/unlit decision is keyed to the
    // BUILDING INDEX and the window's local offset so windows stay in the same
    // spots as the camera moves (otherwise the moving `bx` shifted the hash and
    // windows appeared to blink on and off while scrolling).
    for (let wyOff = 0; (GAME_H - bh - 30) + wyOff < GAME_H - 60; wyOff += 12) {
      const wy = (GAME_H - bh - 30) + wyOff;
      for (let wxOff = 6; wxOff < 94; wxOff += 10) {
        const wx = bx + wxOff;
        const code = (wyOff * 3 + wxOff + i * 7) % 9;
        if (code === 0) ctx.fillStyle = 'rgba(255, 80, 200, 0.55)';
        else if (code === 1) ctx.fillStyle = 'rgba(0, 240, 255, 0.5)';
        else continue;
        ctx.fillRect(wx, wy, 2, 3);
      }
    }
    // Tall antenna with blinking light on some
    if (i % 3 === 0) {
      ctx.fillStyle = '#2a1a4a';
      ctx.fillRect(bx + 48, GAME_H - bh - 60, 2, 20);
      const blink = (Math.floor(Date.now() / 500) + i) % 2;
      ctx.fillStyle = blink ? '#ff3377' : '#660033';
      ctx.fillRect(bx + 47, GAME_H - bh - 62, 4, 3);
    }
  }

  // Mid-ground buildings - more colorful, medium parallax
  const midPalette = [
    { body: '#1a1038', trim: '#ff2aa0' },
    { body: '#120826', trim: '#00f0ff' },
    { body: '#20103a', trim: '#ffcc00' },
    { body: '#160a2a', trim: '#7a33ff' },
  ];
  for (let i = 0; i < 18; i++) {
    const bx = (i * 180 - camX * 0.4) % (GAME_W + 220) - 110;
    const bh = 100 + (i * 53) % 140;
    const pal = midPalette[i % midPalette.length];
    ctx.fillStyle = pal.body;
    ctx.fillRect(bx, GAME_H - bh - 40, 120, bh);
    // Neon trim strips
    ctx.fillStyle = pal.trim;
    ctx.globalAlpha = 0.7;
    ctx.fillRect(bx, GAME_H - bh - 40, 120, 2);
    ctx.fillRect(bx, GAME_H - 44, 120, 2);
    ctx.globalAlpha = 1;
    // Lit windows grid. Hash keyed to building index + local offsets so the window
    // pattern is fixed per building and does not change when the camera scrolls.
    for (let wyOff = 0; (GAME_H - bh - 30) + wyOff < GAME_H - 60; wyOff += 14) {
      const wy = (GAME_H - bh - 30) + wyOff;
      for (let wxOff = 8; wxOff < 112; wxOff += 16) {
        const wx = bx + wxOff;
        const code = (wyOff * 7 + wxOff + i * 13) % 11;
        if (code === 0) ctx.fillStyle = 'rgba(255, 100, 220, 0.85)';
        else if (code === 1) ctx.fillStyle = 'rgba(0, 240, 255, 0.85)';
        else if (code === 2) ctx.fillStyle = 'rgba(255, 204, 0, 0.75)';
        else if (code === 3) ctx.fillStyle = 'rgba(180, 120, 255, 0.7)';
        else continue;
        ctx.fillRect(wx, wy, 4, 6);
      }
    }
    // Vertical neon sign on some buildings
    if (i % 4 === 1) {
      ctx.fillStyle = pal.trim;
      ctx.globalAlpha = 0.8;
      ctx.fillRect(bx + 54, GAME_H - bh - 34, 4, bh - 10);
      ctx.globalAlpha = 1;
    }
    // Rooftop neon holo-advert panels
    if (i % 5 === 0) {
      const adColor = ['#ff2aa0', '#00f0ff', '#ffcc00'][i % 3];
      ctx.fillStyle = adColor;
      ctx.globalAlpha = 0.85;
      ctx.fillRect(bx + 18, GAME_H - bh - 56, 84, 12);
      ctx.fillStyle = '#0a0618';
      ctx.fillRect(bx + 22, GAME_H - bh - 52, 76, 4);
      ctx.globalAlpha = 1;
    }
  }

  // Foreground holographic grid floor (close parallax)
  ctx.strokeStyle = 'rgba(0, 240, 255, 0.22)';
  ctx.lineWidth = 1;
  for (let gy = GAME_H - 32; gy < GAME_H - 2; gy += 6) {
    ctx.beginPath();
    ctx.moveTo(0, gy);
    ctx.lineTo(GAME_W, gy);
    ctx.stroke();
  }
  const gridSpacing = 36;
  const gridOffset = -(camX * 1.0) % gridSpacing;
  for (let gx = gridOffset; gx < GAME_W + gridSpacing; gx += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(gx, GAME_H - 32);
    ctx.lineTo(gx + (gx - GAME_W / 2) * 0.15, GAME_H - 2);
    ctx.stroke();
  }

  // Light rain streaks
  ctx.strokeStyle = 'rgba(180, 220, 255, 0.15)';
  const rainOffset = (Date.now() * 0.4) % 20;
  for (let i = 0; i < 60; i++) {
    const rx = (i * 61 - camX * 0.6) % (GAME_W + 40) - 20;
    const ry = ((i * 37) + rainOffset) % GAME_H;
    ctx.beginPath();
    ctx.moveTo(rx, ry);
    ctx.lineTo(rx - 3, ry + 12);
    ctx.stroke();
  }

  // Foreground ground glow strip
  const groundGrad = ctx.createLinearGradient(0, GAME_H - 48, 0, GAME_H);
  groundGrad.addColorStop(0, 'rgba(255, 42, 160, 0)');
  groundGrad.addColorStop(1, 'rgba(255, 42, 160, 0.25)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, GAME_H - 48, GAME_W, 48);
}

  bg: '#0a0812',
  bgLight: '#12101a',
  primary: '#39ff14',
  secondary: '#ff4fd8',
  accent: '#ffcc00',
  text: '#ffffff',

// Draw panel with border (uses fillRect for compatibility)
function drawPanel(x, y, w, h, borderColor, fillColor = UI.panelBg) {
  ctx.fillStyle = fillColor;
  ctx.fillRect(x, y, w, h);
  if (borderColor) {
    ctx.strokeStyle = borderColor;
    ctx.lineWidth = 2;
    ctx.strokeRect(x, y, w, h);
  }
}

function drawGuitarPreview(shape, x, y, w, h) {
  const img = guitarImages[shape];
  if (img && img.complete && img.naturalWidth > 0) {
    const maxW = w - 16;
    const maxH = h - 16;
    const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight);
    const dw = img.naturalWidth * scale;
    const dh = img.naturalHeight * scale;
    const dx = x + (w - dw) / 2;
    const dy = y + (h - dh) / 2;
    ctx.drawImage(img, dx, dy, dw, dh);
    return true;
  }
  return false;
}

function drawRoundedRect(x, y, w, h, r, fillColor, strokeColor) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fillColor) {
    ctx.fillStyle = fillColor;
    ctx.fill();
  }
  if (strokeColor) {
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

// ---- Distortion Pedal ----
// Triggers the AoE attack: deals PEDAL_DAMAGE to every enemy within PEDAL_RADIUS
// of the player's center, spawns a visual shockwave, kicks off the stomp
// animation, and starts the cooldown.
function triggerDistortionPedal() {
  player.pedalCharges--;
  player.pedalActive = true;
  player.pedalTimer = PEDAL_ANIM_DURATION;
  player.pedalCooldown = PEDAL_COOLDOWN;

  const cx = player.x + player.w / 2;
  const cy = player.y + player.h;

  // AoE damage to every living (non-invulnerable) enemy in range. Bosses take
  // the same damage as other enemies - the pedal is a finishing-move style tool.
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.invulnerable) continue;     // dashers shrug it off
    if (e.type === 'dasher' && !e.active) continue;
    const ex = e.x + 16;              // approx enemy center
    const ey = e.y + 16;
    const dx = ex - cx, dy = ey - cy;
    if (dx * dx + dy * dy <= PEDAL_RADIUS * PEDAL_RADIUS) {
      e.hp -= PEDAL_DAMAGE;
      e.hitCooldown = 18;
      e.hitFlash = 14;
      if (e.hp <= 0) {
        e.alive = false;
        enemiesKilled++;
        const isBoss    = e.type === 'boss';
        const isBigbot  = e.type === 'bigbot';
        const isBrute   = e.type === 'brute';
        const isSoldier = e.type === 'soldier';
        const isDrone   = e.type === 'drone';
        if (isBoss)         score += 1000;
        else if (isBigbot)  score += 200;
        else if (isBrute)   score += 120;
        else if (isSoldier) score += 90;
        else if (isDrone)   score += 60;
        else                score += 50;
        guitarKillSound();
        if (isBoss) {
          bossOutroTimer = 120;
          bossProjectiles.length = 0;
        }
      }
    }
  }

  // Cosmetic shockwave(s) - one quick burst + one wider ring for the stomp rebound.
  pedalEffects.push({ x: cx, y: cy, age: 0, life: 30, maxR: PEDAL_RADIUS });
  pedalEffects.push({ x: cx, y: cy, age: 0, life: 46, maxR: PEDAL_RADIUS * 1.15 });

  // Distorted buzz + low thump.
  try {
    const now = audioCtx.currentTime;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, now);
    gain.gain.exponentialRampToValueAtTime(0.35 * currentVolume() / MASTER_VOLUME_MAX, now + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
    gain.connect(audioCtx.destination);
    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(160, now);
    osc1.frequency.exponentialRampToValueAtTime(55, now + 0.35);
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(230, now);
    osc2.frequency.exponentialRampToValueAtTime(80, now + 0.35);
    osc1.connect(gain); osc2.connect(gain);
    osc1.start(now); osc2.start(now);
    osc1.stop(now + 0.42); osc2.stop(now + 0.42);
  } catch (_) { /* audio may be suspended */ }
}

// Draw the pedal sitting under the player while the stomp animation plays.
// Anim timeline: tt (0..1). Foot slams down at tt=0.25 and tt=0.7 - two quick
// stomps - with the pedal LED flashing on each impact and the shockwave already
// drawn by drawPedalShockwaves().
function drawPedalUnderPlayer() {
  if (!player.pedalActive) return;
  const tt = 1 - player.pedalTimer / PEDAL_ANIM_DURATION;
  const cx = player.x + player.w / 2 - camX;
  const topY = player.y + player.h - 8;

  // Pedal body - small angled chassis with a red LED and a big white footswitch.
  ctx.save();
  ctx.translate(cx, topY);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(0, 8, 28, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Chassis
  const chassisW = 44, chassisH = 22;
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(-chassisW / 2, -chassisH, chassisW, chassisH);
  ctx.fillStyle = '#3a0f28';
  ctx.fillRect(-chassisW / 2, -chassisH, chassisW, 4);
  // Label strip
  ctx.fillStyle = '#ff2aa0';
  ctx.fillRect(-chassisW / 2 + 4, -chassisH + 7, chassisW - 8, 3);
  // LED (flashes brighter on stomp)
  const stomp = (tt > 0.2 && tt < 0.35) || (tt > 0.65 && tt < 0.8);
  ctx.fillStyle = stomp ? '#ffff66' : '#9a2d2d';
  ctx.fillRect(chassisW / 2 - 9, -chassisH + 14, 4, 4);

  // Footswitch (pressed-down pose during stomp windows)
  const pressed = stomp;
  const footSize = pressed ? 10 : 14;
  const footY = pressed ? -chassisH + 3 : -chassisH - 4;
  ctx.fillStyle = '#e0e0e0';
  ctx.beginPath();
  ctx.arc(0, footY, footSize / 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#9a9a9a';
  ctx.beginPath();
  ctx.arc(0, footY, footSize / 2 - 3, 0, Math.PI * 2);
  ctx.fill();

  // Stomping boot overlay - appears from above and slams down on the switch.
  const bootProgress = tt < 0.5
    ? Math.max(0, Math.min(1, (tt - 0.1) / 0.25)) // first stomp
    : Math.max(0, Math.min(1, (tt - 0.55) / 0.25)); // second stomp
  const bootY = -chassisH - 42 + bootProgress * 38;
  ctx.fillStyle = '#2a1410';
  ctx.fillRect(-14, bootY, 28, 18);
  ctx.fillStyle = '#482018';
  ctx.fillRect(-14, bootY + 14, 28, 6);
  // Laces
  ctx.strokeStyle = '#eaeaea';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-8, bootY + 4 + i * 4);
    ctx.lineTo(8, bootY + 4 + i * 4);
    ctx.stroke();
  }
  ctx.restore();
}

// Expanding magenta/yellow rings radiating from the stomp point. Drawn in world
// coords with the camera offset applied.
function drawPedalShockwaves() {
  for (const fx of pedalEffects) {
    const t = fx.age / fx.life;
    const r = fx.maxR * (0.15 + 0.85 * t);
    const alpha = 1 - t;
    ctx.strokeStyle = `rgba(255, 42, 160, ${alpha * 0.9})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(fx.x - camX, fx.y, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255, 238, 102, ${alpha * 0.55})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(fx.x - camX, fx.y, r * 0.8, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
}

// Reward pickup (heart / pedal icon) floating above its high ledge. Gently
// bobs and pulses to draw attention.
function drawRewardPickups() {
  for (const r of rewardPickups) {
    if (r.collected) continue;
    const sx = r.x - camX;
    const bob = Math.sin(r.bobTimer) * 3;
    const sy = r.y + bob;
    // Glow halo
    const pulse = 0.6 + 0.4 * Math.sin(r.bobTimer * 1.5);
    const grad = ctx.createRadialGradient(sx, sy, 2, sx, sy, 26);
    grad.addColorStop(0, r.type === 'heart' ? 'rgba(255, 90, 120, 0.85)' : 'rgba(255, 160, 255, 0.85)');
    grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
    ctx.fillStyle = grad;
    ctx.globalAlpha = pulse;
    ctx.beginPath();
    ctx.arc(sx, sy, 26, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    if (r.type === 'heart') {
      // Pixel heart
      ctx.fillStyle = '#ff3355';
      ctx.fillRect(sx - 7, sy - 6, 4, 4);
      ctx.fillRect(sx + 3, sy - 6, 4, 4);
      ctx.fillRect(sx - 9, sy - 2, 18, 4);
      ctx.fillRect(sx - 6, sy + 2, 12, 4);
      ctx.fillRect(sx - 3, sy + 6, 6, 3);
      // Highlight
      ctx.fillStyle = '#ff9da8';
      ctx.fillRect(sx - 6, sy - 5, 2, 2);
      ctx.fillRect(sx + 4, sy - 5, 2, 2);
    } else {
      // Pedal icon - mini chassis with magenta label and footswitch
      ctx.fillStyle = '#1a1a22';
      ctx.fillRect(sx - 11, sy - 7, 22, 14);
      ctx.fillStyle = '#ff2aa0';
      ctx.fillRect(sx - 9, sy - 4, 18, 3);
      ctx.fillStyle = '#ffee66';
      ctx.fillRect(sx + 6, sy + 1, 2, 2);
      ctx.fillStyle = '#e0e0e0';
      ctx.beginPath();
      ctx.arc(sx - 3, sy + 2, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawHUD() {
  ctx.fillStyle = 'rgba(6, 6, 10, 0.84)';
  ctx.fillRect(0, 0, UI_W, 56);
  ctx.strokeStyle = UI.border;
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, UI_W, 56);

  drawPanel(10, 8, 150, 40, UI.border, 'rgba(16, 20, 12, 0.92)');
  drawPanel(170, 8, 250, 40, player.hasGuitar ? UI.secondary : 'rgba(255, 255, 255, 0.08)', 'rgba(20, 16, 28, 0.92)');
  drawPanel(430, 8, 176, 40, UI.accent, 'rgba(28, 24, 8, 0.92)');
  drawPanel(616, 8, 174, 40, UI.border, 'rgba(24, 12, 16, 0.92)');

  ctx.textBaseline = 'top';

  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText('SCORE', 20, 14);
  ctx.fillStyle = UI.primary;
  ctx.font = 'bold 18px Consolas, "Courier New", monospace';
  ctx.fillText(score.toString().padStart(5, '0'), 20, 28);

  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText('BEER', 96, 14);
  ctx.fillStyle = UI.accent;
  ctx.font = 'bold 18px Consolas, "Courier New", monospace';
  ctx.fillText(totalBeer.toString().padStart(4, '0'), 96, 28);

  ctx.fillStyle = player.hasGuitar ? UI.secondary : UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText(player.hasGuitar ? 'GEAR' : 'NO GUITAR', 180, 14);
  ctx.font = 'bold 16px Consolas, "Courier New", monospace';
  if (player.hasGuitar) {
    const g = guitarTypes[player.guitarType];
    ctx.fillStyle = g.color;
    ctx.fillText(g.name.toUpperCase(), 180, 28);
    ctx.fillStyle = UI.textDim;
    ctx.font = 'bold 11px Consolas, "Courier New", monospace';
    ctx.fillText('E / X ATTACK', 322, 30);
  } else {
    ctx.fillStyle = UI.textDim;
    ctx.font = 'bold 13px Consolas, "Courier New", monospace';
    ctx.fillText('VISIT SHOP FOR A GUITAR', 180, 30);
  }

  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText('LEVEL ' + currentLevel + ' / ' + TOTAL_LEVELS, 442, 14);
  ctx.fillStyle = UI.accent;
  ctx.font = 'bold 16px Consolas, "Courier New", monospace';
  const levelName = (LEVEL_NAMES[currentLevel] || 'STAGE ' + currentLevel).toUpperCase();
  ctx.fillText(levelName, 442, 28);

  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText('LIVES', 626, 14);
  // Draw up to MAX_LIVES hearts. When the player has collected bonus hearts
  // beyond the usual 3, the extra slots appear; unfilled slots stay empty.
  // Hearts shrink slightly when displaying more than 3 so they still fit.
  const heartsToShow = Math.max(3, Math.min(MAX_LIVES, lives));
  const compactHearts = heartsToShow > 3;
  const heartSize = compactHearts ? 0.7 : 1;
  const heartGap  = compactHearts ? 22 : 32;
  const heartX0   = compactHearts ? 640 : 660;
  for (let i = 0; i < heartsToShow; i++) {
    const hx = heartX0 + i * heartGap;
    const active = i < lives;
    const s = heartSize;
    ctx.fillStyle = active ? UI.danger : '#392028';
    ctx.fillRect(hx,           27, 8 * s, 8 * s);
    ctx.fillRect(hx + 10 * s,  27, 8 * s, 8 * s);
    ctx.fillRect(hx + 3 * s,   27 + 8 * s, 10 * s, 8 * s);
    ctx.fillRect(hx + 6 * s,   27 + 16 * s, 4 * s, 2 * s);
    if (active) {
      ctx.fillStyle = '#ff9da0';
      ctx.fillRect(hx + 2 * s,  29, 2 * s, 2 * s);
      ctx.fillRect(hx + 12 * s, 29, 2 * s, 2 * s);
    }
  }

  // --- Pedal charges indicator ---
  // Rendered just below the main HUD panel in its own slim strip when the
  // player is actually carrying pedals (or one just went off cooldown).
  if (player.pedalCharges > 0 || player.pedalCooldown > 0 || player.pedalActive) {
    const stripY = 56;
    const stripH = 20;
    ctx.fillStyle = 'rgba(14, 6, 22, 0.85)';
    ctx.fillRect(UI_W - 220, stripY, 220, stripH);
    ctx.strokeStyle = 'rgba(255, 42, 160, 0.55)';
    ctx.strokeRect(UI_W - 220, stripY, 220, stripH);
    ctx.fillStyle = '#ff2aa0';
    ctx.font = 'bold 10px Consolas, "Courier New", monospace';
    ctx.fillText('DISTORTION PEDAL  [F]', UI_W - 214, stripY + 6);
    // Mini pedal icons for each available charge; the top-of-stack one fades
    // while the cooldown is running so the player gets visual feedback.
    for (let i = 0; i < MAX_PEDAL_CHARGES; i++) {
      const px = UI_W - 94 + i * 14;
      const py = stripY + 6;
      const filled = i < player.pedalCharges;
      const cooldownFade = filled && (i === player.pedalCharges - 1) && player.pedalCooldown > 0;
      ctx.globalAlpha = filled ? (cooldownFade ? 0.35 : 1) : 0.28;
      ctx.fillStyle = filled ? '#ff2aa0' : '#3a1020';
      ctx.fillRect(px, py, 10, 7);
      if (filled) {
        ctx.fillStyle = '#ffee66';
        ctx.fillRect(px + 7, py + 2, 2, 2);
      }
      ctx.globalAlpha = 1;
    }
  }

  ctx.textBaseline = 'alphabetic';
}

// ---- Shop ----
let shopCol = 0; // Column (0-2)
let shopRow = 0; // Row (0-2)
let shopFocus = 'grid'; // 'grid' | 'footer' - which region the dpad controls
let shopFooterSel = 1;  // 0 = replay button, 1 = next-level button
const SHOP_COLS = 3;
let SHOP_ROWS = 3; // grows when reward guitars are unlocked (see unlockDiyPunkGuitar)
let shopConfirming = false;
let shopConfirmSelection = 0; // 0 - да, 1 - нет
let shopConfirmReleaseRequired = false;
let shopConfirmMode = 'buy'; // 'buy' | 'equip' | 'proceed' | 'replay'
let shopConfirmGuitarIdx = -1; // Snapshot of selected guitar when the dialog opens.
let shopGpUpHeld = false;
let shopGpDownHeld = false;
let shopGpLeftHeld = false;
let shopGpRightHeld = false;

function guitarIndexFromShop(col, row) {
  const idx = row * SHOP_COLS + col;
  return idx < guitarTypes.length ? idx : -1;
}

function shopSelection() {
  return guitarIndexFromShop(shopCol, shopRow);
}

// Helper: open the confirmation dialog for buying or equipping a specific guitar.
// Using an explicit index (not live shopSelection) prevents mouse hover from silently
// retargeting the dialog onto a different guitar.
function openGuitarConfirm(idx, viaKeyboard) {
  if (idx < 0 || idx >= guitarTypes.length) return;
  const g = guitarTypes[idx];
  const isOwned = ownedGuitars.includes(idx);
  const isEquipped = isOwned && player.hasGuitar && player.guitarType === idx;
  if (isEquipped) return; // Already equipped: nothing to confirm.
  if (!isOwned && totalBeer < g.price) return; // Can't afford.
  shopConfirming = true;
  shopConfirmSelection = 0;
  shopConfirmReleaseRequired = !!viaKeyboard;
  shopConfirmMode = isOwned ? 'equip' : 'buy';
  shopConfirmGuitarIdx = idx;
}

function openProceedConfirm(viaKeyboard) {
  shopConfirming = true;
  shopConfirmSelection = 0;
  shopConfirmReleaseRequired = !!viaKeyboard;
  shopConfirmMode = 'proceed';
  shopConfirmGuitarIdx = -1;
}

function openReplayConfirm(viaKeyboard) {
  if (lastCompletedLevel <= 0) return; // No level beaten yet - nothing to replay.
  shopConfirming = true;
  shopConfirmSelection = 0;
  shopConfirmReleaseRequired = !!viaKeyboard;
  shopConfirmMode = 'replay';
  shopConfirmGuitarIdx = -1;
}

function closeConfirm() {
  shopConfirming = false;
  shopConfirmReleaseRequired = false;
  shopConfirmGuitarIdx = -1;
}

function purchaseSelectedGuitar() {
  const idx = shopConfirmGuitarIdx;
  if (idx < 0 || idx >= guitarTypes.length) return;
  const g = guitarTypes[idx];
  if (shopConfirmMode === 'equip' && ownedGuitars.includes(idx)) {
    player.hasGuitar = true;
    player.guitarType = idx;
  } else if (shopConfirmMode === 'buy' && !ownedGuitars.includes(idx) && totalBeer >= g.price) {
    totalBeer -= g.price;
    moneySpent += g.price;
    ownedGuitars.push(idx);
    player.hasGuitar = true;
    player.guitarType = idx;
    buySound();
  }
}

function drawShopItem(i, x, y, cardH) {
  const g = guitarTypes[i];
  const owned = ownedGuitars.includes(i);
  const equipped = owned && player.hasGuitar && player.guitarType === i;
  const selected = shopSelection() === i;
  const canAfford = totalBeer >= g.price;
  const cardW = 220;
  if (cardH === undefined) cardH = 42;
  // In compact mode the card is shorter, so pull all row-internal y offsets up
  // slightly and shrink the color stripe so nothing clips.
  const compact = cardH < 40;
  const nameY   = compact ? y + 13 : y + 15;
  const statusY = compact ? y + 26 : y + 29;
  const dmgY    = compact ? y + 20 : y + 22;
  const stripeH = Math.min(24, cardH - 12);
  const stripeY = y + Math.max(6, Math.floor((cardH - stripeH) / 2));
  const cardFill = equipped ? 'rgba(255, 79, 216, 0.18)' : (selected ? 'rgba(57, 255, 20, 0.18)' : 'rgba(10, 8, 18, 0.88)');
  const borderColor = equipped ? UI.secondary : (selected ? UI.primary : 'rgba(255, 255, 255, 0.08)');

  drawPanel(x, y, cardW, cardH, borderColor, cardFill);
  if (selected) {
    ctx.fillStyle = 'rgba(57, 255, 20, 0.08)';
    ctx.fillRect(x + 1, y + 1, cardW - 2, cardH - 2);
    ctx.fillStyle = UI.primary;
    ctx.fillRect(x + 0, y + 0, 4, cardH);
  }
  if (equipped) {
    ctx.fillStyle = UI.secondary;
    ctx.fillRect(x + 0, y + 0, 4, cardH);
  }

  // Guitar color indicator
  ctx.fillStyle = owned ? '#333' : g.color;
  ctx.fillRect(x + 12, stripeY, 7, stripeH);

  // Name
  ctx.fillStyle = equipped ? UI.secondary : (owned ? UI.textDim : (selected ? UI.primary : UI.text));
  ctx.font = 'bold 12px Consolas, "Courier New", monospace';
  ctx.fillText(g.name.toUpperCase(), x + 28, nameY);

  // Price / owned / equipped. Free reward guitars (price 0) show FREE instead
  // of "0 BEER" so the unlock reads as a trophy rather than pocket change.
  let statusText, statusColor;
  if (equipped) { statusText = 'EQUIPPED'; statusColor = UI.secondary; }
  else if (owned) { statusText = 'OWNED'; statusColor = UI.success; }
  else if (g.price === 0) { statusText = 'FREE - EARNED'; statusColor = UI.accent; }
  else { statusText = g.price + ' BEER'; statusColor = canAfford ? UI.accent : UI.danger; }
  ctx.fillStyle = statusColor;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText(statusText, x + 28, statusY);

  // Damage stat
  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  const dmgText = 'DMG ' + g.damage;
  ctx.fillText(dmgText, x + cardW - 14 - ctx.measureText(dmgText).width, dmgY);

  // Don't register card interactions while the confirmation dialog is open so the
  // dialog can't be silently retargeted by mouse hover/clicks on other cards.
  if (!shopConfirming) {
    addInteractiveRegion(x, y, cardW, cardH, () => {
      shopCol = i % SHOP_COLS;
      shopRow = Math.floor(i / SHOP_COLS);
      openGuitarConfirm(i, false);
    }, () => {
      shopCol = i % SHOP_COLS;
      shopRow = Math.floor(i / SHOP_COLS);
    });
  }
}

function drawShop() {
  // Header panel
  ctx.fillStyle = UI.panelBg;
  ctx.fillRect(0, 0, UI_W, 80);
  ctx.strokeStyle = UI.border;
  ctx.beginPath();
  ctx.moveTo(0, 80); ctx.lineTo(UI_W, 80);
  ctx.stroke();

  // Title
  ctx.fillStyle = UI.primary;
  ctx.font = 'bold 28px Arial';
  const shopTitle = 'GUITAR SHOP';
  const shopTitleWidth = ctx.measureText(shopTitle).width;
  ctx.fillText(shopTitle, 400 - shopTitleWidth / 2, 35);

  // Currently equipped guitar (top-left indicator)
  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 11px Consolas, "Courier New", monospace';
  ctx.fillText('EQUIPPED', 20, 20);
  if (player.hasGuitar) {
    const eq = guitarTypes[player.guitarType];
    // Color swatch
    ctx.fillStyle = eq.color;
    ctx.fillRect(20, 32, 8, 22);
    // Name + stats
    ctx.fillStyle = UI.secondary;
    ctx.font = 'bold 14px Consolas, "Courier New", monospace';
    ctx.fillText(eq.name.toUpperCase(), 34, 45);
    ctx.fillStyle = UI.textDim;
    ctx.font = 'bold 11px Consolas, "Courier New", monospace';
    ctx.fillText('DMG ' + eq.damage, 34, 60);
  } else {
    ctx.fillStyle = UI.danger;
    ctx.font = 'bold 14px Consolas, "Courier New", monospace';
    ctx.fillText('NONE - BARE HANDS', 20, 50);
  }

  // Beer balance
  ctx.fillStyle = UI.accent;
  ctx.font = 'bold 20px Arial';
  const beerText = 'BEER ' + totalBeer;
  const beerTextWidth = ctx.measureText(beerText).width;
  ctx.fillText(beerText, 760 - beerTextWidth, 35);

  // Preview section
  ctx.fillStyle = UI.textDim;
  ctx.font = '12px Consolas, "Courier New", monospace';
  const previewLabel = 'PREVIEW';
  const previewLabelWidth = ctx.measureText(previewLabel).width;
  ctx.fillText(previewLabel, 400 - previewLabelWidth / 2, 100);

  // Guitar preview box
  const previewX = 275;
  const previewY = 108;
  const previewW = 250;
  const previewH = 120;
  drawPanel(previewX, previewY, previewW, previewH, UI.border);

  const previewShape = guitarTypes[shopSelection()].shape;
  if (!drawGuitarPreview(previewShape, previewX, previewY, previewW, previewH)) {
    ctx.save();
    ctx.translate(previewX + previewW / 2, previewY + previewH / 2);
    const scale = 3.2;
    ctx.scale(scale, scale);
    drawGuitarShape(-14, -10, 1, shopSelection(), false, 0);
    ctx.restore();
  }

  // Guitar name under preview
  const prevGuitar = guitarTypes[shopSelection()];
  ctx.fillStyle = prevGuitar.color;
  ctx.font = 'bold 16px Consolas, "Courier New", monospace';
  const previewName = prevGuitar.name.toUpperCase();
  ctx.fillText(previewName, 400 - ctx.measureText(previewName).width / 2, 245);
  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 13px Consolas, "Courier New", monospace';
  const previewDmg = 'DMG ' + prevGuitar.damage;
  ctx.fillText(previewDmg, 400 - ctx.measureText(previewDmg).width / 2, 265);

  // Auto-compact when more than 3 rows of guitars exist (e.g. after unlocking
  // the DIY Punk Guitar reward) so everything still fits above the footer.
  const cols = 3;
  const totalRows = Math.ceil(guitarTypes.length / cols);
  const compact = totalRows > 3;
  const listTitleY = compact ? 272 : 290;
  const rowY       = compact ? 282 : 302;
  const rowGap     = compact ? 37  : 44;
  const cardH      = compact ? 34  : 42;

  // Guitar list header
  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 14px Arial';
  const listTitle = 'AVAILABLE GUITARS';
  const listTitleWidth = ctx.measureText(listTitle).width;
  ctx.fillText(listTitle, 400 - listTitleWidth / 2, listTitleY);

  const xStart = 50;
  const xGap = 250;
  for (let i = 0; i < guitarTypes.length; i++) {
    const column = i % cols;
    const row = Math.floor(i / cols);
    const x = xStart + column * xGap;
    const y = rowY + row * rowGap;
    drawShopItem(i, x, y, cardH);
  }

  // Confirmation dialog - semi-transparent backdrop to prevent accidental clicks on
  // underlying UI and to visually emphasize the modal state.
  if (shopConfirming) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
    ctx.fillRect(0, 0, UI_W, UI_H);

    const dialogW = 380;
    const dialogH = 128;
    const dialogX = 400 - dialogW / 2;
    const dialogY = 176;
    drawPanel(dialogX, dialogY, dialogW, dialogH, UI.primary, UI.panelBg);

    ctx.fillStyle = UI.text;
    ctx.font = 'bold 16px Consolas, "Courier New", monospace';
    let confirmText;
    if (shopConfirmMode === 'proceed') confirmText = 'HEAD OUT TO LEVEL ' + currentLevel + '?';
    else if (shopConfirmMode === 'replay') confirmText = 'REPLAY LEVEL ' + lastCompletedLevel + '?';
    else if (shopConfirmMode === 'equip') confirmText = 'EQUIP THIS GUITAR?';
    else confirmText = 'BUY THIS GUITAR?';
    ctx.fillText(confirmText, 400 - ctx.measureText(confirmText).width / 2, dialogY + 30);

    if (shopConfirmMode === 'proceed' || shopConfirmMode === 'replay') {
      ctx.fillStyle = UI.textDim;
      ctx.font = 'bold 12px Consolas, "Courier New", monospace';
      if (shopConfirmMode === 'replay') {
        ctx.fillStyle = UI.accent;
        const info = 'FARM MORE BEER - KEEP WHAT YOU EARN';
        ctx.fillText(info, 400 - ctx.measureText(info).width / 2, dialogY + 58);
      } else {
        const info = player.hasGuitar
          ? 'EQUIPPED: ' + guitarTypes[player.guitarType].name.toUpperCase()
          : 'WARNING: NO GUITAR EQUIPPED';
        ctx.fillStyle = player.hasGuitar ? UI.secondary : UI.danger;
        ctx.fillText(info, 400 - ctx.measureText(info).width / 2, dialogY + 58);
      }
    } else if (shopConfirmGuitarIdx >= 0) {
      const g = guitarTypes[shopConfirmGuitarIdx];
      ctx.fillStyle = g.color;
      ctx.font = 'bold 13px Consolas, "Courier New", monospace';
      const guitarName = shopConfirmMode === 'equip'
        ? g.name.toUpperCase() + ' - FREE'
        : g.name.toUpperCase() + ' - ' + g.price + ' BEER';
      ctx.fillText(guitarName, 400 - ctx.measureText(guitarName).width / 2, dialogY + 54);
      ctx.fillStyle = UI.textDim;
      ctx.font = 'bold 11px Consolas, "Courier New", monospace';
      const balance = 'BALANCE AFTER: ' + (shopConfirmMode === 'buy' ? (totalBeer - g.price) : totalBeer) + ' BEER';
      ctx.fillText(balance, 400 - ctx.measureText(balance).width / 2, dialogY + 72);
    }

    // Yes/No buttons
    const buttonY = dialogY + 90;
    const buttonW = 76;
    const buttonH = 26;
    const buttonGap = 22;
    const totalButtonsWidth = buttonW * 2 + buttonGap;
    const yesX = 400 - totalButtonsWidth / 2;
    const noX = yesX + buttonW + buttonGap;

    let yesLabel = 'YES';
    let noLabel = 'NO';
    if (shopConfirmMode === 'proceed') { yesLabel = 'GO';     noLabel = 'STAY'; }
    if (shopConfirmMode === 'replay')  { yesLabel = 'REPLAY'; noLabel = 'CANCEL'; }

    // Yes button
    const yesFill = shopConfirmSelection === 0 ? UI.primary : UI.panelBg;
    const yesBorder = shopConfirmSelection === 0 ? UI.primary : UI.border;
    drawPanel(yesX, buttonY, buttonW, buttonH, yesBorder, yesFill);
    ctx.fillStyle = shopConfirmSelection === 0 ? UI.bg : UI.text;
    ctx.font = 'bold 13px Consolas, "Courier New", monospace';
    ctx.fillText(yesLabel, yesX + buttonW / 2 - ctx.measureText(yesLabel).width / 2, buttonY + 18);
    addInteractiveRegion(yesX, buttonY, buttonW, buttonH, () => {
      shopConfirmSelection = 0;
      confirmAccept();
    }, () => {
      shopConfirmSelection = 0;
    });

    // No button
    const noFill = shopConfirmSelection === 1 ? UI.primary : UI.panelBg;
    const noBorder = shopConfirmSelection === 1 ? UI.primary : UI.border;
    drawPanel(noX, buttonY, buttonW, buttonH, noBorder, noFill);
    ctx.fillStyle = shopConfirmSelection === 1 ? UI.bg : UI.text;
    ctx.font = 'bold 13px Consolas, "Courier New", monospace';
    ctx.fillText(noLabel, noX + buttonW / 2 - ctx.measureText(noLabel).width / 2, buttonY + 18);
    addInteractiveRegion(noX, buttonY, buttonW, buttonH, () => {
      shopConfirmSelection = 1;
      closeConfirm();
    }, () => {
      shopConfirmSelection = 1;
    });
  }

  // Footer panel with Replay / Next Level buttons
  ctx.fillStyle = UI.panelBg;
  ctx.fillRect(0, UI_H - 44, UI_W, 44);
  ctx.strokeStyle = UI.border;
  ctx.beginPath();
  ctx.moveTo(0, UI_H - 44); ctx.lineTo(UI_W, UI_H - 44);
  ctx.stroke();

  const btnY = UI_H - 36;
  const btnH = 28;

  const footerFocused = shopFocus === 'footer' && !shopConfirming;

  // Replay button (only relevant after beating at least one level)
  if (lastCompletedLevel > 0 && !shopConfirming) {
    const replayW = 200;
    const replayX = 20;
    const replaySelected = footerFocused && shopFooterSel === 0;
    drawPanel(replayX, btnY, replayW, btnH, UI.accent, replaySelected ? 'rgba(255, 204, 0, 0.32)' : 'rgba(255, 204, 0, 0.14)');
    if (replaySelected) {
      ctx.strokeStyle = UI.accent;
      ctx.lineWidth = 2;
      ctx.strokeRect(replayX - 2, btnY - 2, replayW + 4, btnH + 4);
      ctx.lineWidth = 1;
    }
    ctx.fillStyle = UI.accent;
    ctx.font = 'bold 13px Consolas, "Courier New", monospace';
    const replayLabel = 'REPLAY LVL ' + lastCompletedLevel + '  [R]';
    ctx.fillText(replayLabel, replayX + replayW / 2 - ctx.measureText(replayLabel).width / 2, btnY + 18);
    addInteractiveRegion(replayX, btnY, replayW, btnH, () => {
      openReplayConfirm(false);
    }, () => {
      shopFocus = 'footer';
      shopFooterSel = 0;
    });
  }

  // Next Level button (proceed)
  if (!shopConfirming) {
    const nextW = 230;
    const nextX = UI_W - 20 - nextW;
    const nextSelected = footerFocused && shopFooterSel === 1;
    drawPanel(nextX, btnY, nextW, btnH, UI.primary, nextSelected ? 'rgba(57, 255, 20, 0.32)' : 'rgba(57, 255, 20, 0.16)');
    if (nextSelected) {
      ctx.strokeStyle = UI.primary;
      ctx.lineWidth = 2;
      ctx.strokeRect(nextX - 2, btnY - 2, nextW + 4, btnH + 4);
      ctx.lineWidth = 1;
    }
    ctx.fillStyle = UI.primary;
    ctx.font = 'bold 13px Consolas, "Courier New", monospace';
    const nextLabel = 'NEXT LVL ' + currentLevel + '  [SPACE]';
    ctx.fillText(nextLabel, nextX + nextW / 2 - ctx.measureText(nextLabel).width / 2, btnY + 18);
    addInteractiveRegion(nextX, btnY, nextW, btnH, () => {
      audioCtx.resume();
      openProceedConfirm(false);
    }, () => {
      shopFocus = 'footer';
      shopFooterSel = 1;
    });
  }

  // Center hint
  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 10px Consolas, "Courier New", monospace';
  const hint = footerFocused
    ? 'LEFT / RIGHT: CHOOSE   //   E / ENTER / A: CONFIRM'
    : 'E / ENTER: SELECT GUITAR   //   DOWN: REPLAY / NEXT';
  ctx.fillText(hint, 400 - ctx.measureText(hint).width / 2, btnY + 17);
}

function updateShop() {
  if (!shopConfirming) {
    const replayAvailable = lastCompletedLevel > 0;
    // Snap focus back to the grid if the replay button disappears mid-navigation.
    if (shopFocus === 'footer' && !replayAvailable) shopFooterSel = 1;

    const pressUp    = (keys['ArrowUp']    && !keys['ArrowUp_held'])    || (keys['gpUp']    && !shopGpUpHeld);
    const pressDown  = (keys['ArrowDown']  && !keys['ArrowDown_held'])  || (keys['gpDown']  && !shopGpDownHeld);
    const pressLeft  = (keys['ArrowLeft']  && !keys['ArrowLeft_held'])  || (keys['gpLeft']  && !shopGpLeftHeld);
    const pressRight = (keys['ArrowRight'] && !keys['ArrowRight_held']) || (keys['gpRight'] && !shopGpRightHeld);

    if (shopFocus === 'grid') {
      // 2D Navigation - move around the grid freely (keyboard or gamepad)
      if (pressUp) shopRow = Math.max(0, shopRow - 1);
      if (pressDown) {
        // Dropping past the bottom row transfers focus to the Replay / Next-Level footer.
        if (shopRow >= SHOP_ROWS - 1) {
          shopFocus = 'footer';
          shopFooterSel = replayAvailable ? (shopCol === 0 ? 0 : 1) : 1;
        } else {
          shopRow = Math.min(SHOP_ROWS - 1, shopRow + 1);
        }
      }
      if (pressLeft)  shopCol = Math.max(0, shopCol - 1);
      if (pressRight) shopCol = Math.min(SHOP_COLS - 1, shopCol + 1);
    } else {
      // Footer focus: Left/Right toggle between Replay and Next Level (if available).
      if (pressLeft && replayAvailable)  shopFooterSel = 0;
      if (pressRight) shopFooterSel = 1;
      if (pressUp) {
        shopFocus = 'grid';
        shopRow = SHOP_ROWS - 1;
      }
    }

    // Latch press-release state for all navigation keys.
    if (keys['ArrowUp'])    keys['ArrowUp_held']    = true; else keys['ArrowUp_held']    = false;
    if (keys['ArrowDown'])  keys['ArrowDown_held']  = true; else keys['ArrowDown_held']  = false;
    if (keys['ArrowLeft'])  keys['ArrowLeft_held']  = true; else keys['ArrowLeft_held']  = false;
    if (keys['ArrowRight']) keys['ArrowRight_held'] = true; else keys['ArrowRight_held'] = false;
    shopGpUpHeld    = !!keys['gpUp'];
    shopGpDownHeld  = !!keys['gpDown'];
    shopGpLeftHeld  = !!keys['gpLeft'];
    shopGpRightHeld = !!keys['gpRight'];

    // Validate selection (skip empty cells)
    const idx = shopSelection();
    if (idx < 0 || idx >= guitarTypes.length) {
      shopCol = 0;
      shopRow = 0;
    }

    // Enter / E / A button:
    //  - on grid focus: open guitar buy/equip confirmation
    //  - on footer focus: open replay or proceed confirmation
    if ((keys['Enter'] && !keys['Enter_held']) || (keys['KeyE'] && !keys['KeyE_held']) || (keys['gpJump'] && !keys['gpJump_held'])) {
      if (shopFocus === 'footer') {
        audioCtx.resume();
        if (shopFooterSel === 0 && replayAvailable) openReplayConfirm(true);
        else openProceedConfirm(true);
      } else {
        openGuitarConfirm(shopSelection(), true);
      }
      if (keys['Enter']) keys['Enter_held'] = true;
      if (keys['KeyE']) keys['KeyE_held'] = true;
      if (keys['gpJump']) keys['gpJump_held'] = true;
    }
    if (!keys['Enter']) keys['Enter_held'] = false;
    if (!keys['KeyE']) keys['KeyE_held'] = false;
    if (!keys['gpJump']) keys['gpJump_held'] = false;

    // Proceed to next level (now requires confirmation)
    if (!shopConfirming && ((keys['Space'] && !keys['Space_held']) || (keys['gpStart'] && !keys['gpStart_held']))) {
      audioCtx.resume();
      openProceedConfirm(true);
      if (keys['Space']) keys['Space_held'] = true;
      if (keys['gpStart']) keys['gpStart_held'] = true;
    }
    if (!keys['Space']) keys['Space_held'] = false;
    if (!keys['gpStart']) keys['gpStart_held'] = false;

    // Replay previously completed level (R key)
    if (!shopConfirming && keys['KeyR'] && !keys['KeyR_held'] && lastCompletedLevel > 0) {
      audioCtx.resume();
      openReplayConfirm(true);
      keys['KeyR_held'] = true;
    }
    if (!keys['KeyR']) keys['KeyR_held'] = false;
  } else {
    if (!keys['Enter'] && !keys['KeyE'] && !keys['gpJump']) {
      shopConfirmReleaseRequired = false;
    }

    // Confirmation dialog navigation
    if ((keys['ArrowLeft'] && !keys['ArrowLeft_held']) || (keys['gpLeft'] && !shopGpLeftHeld)) {
      shopConfirmSelection = Math.max(0, shopConfirmSelection - 1);
      if (keys['ArrowLeft']) keys['ArrowLeft_held'] = true;
      if (keys['gpLeft']) shopGpLeftHeld = true;
    }
    if (!keys['ArrowLeft']) keys['ArrowLeft_held'] = false;
    if (!keys['gpLeft']) shopGpLeftHeld = false;

    if ((keys['ArrowRight'] && !keys['ArrowRight_held']) || (keys['gpRight'] && !shopGpRightHeld)) {
      shopConfirmSelection = Math.min(1, shopConfirmSelection + 1);
      if (keys['ArrowRight']) keys['ArrowRight_held'] = true;
      if (keys['gpRight']) shopGpRightHeld = true;
    }
    if (!keys['ArrowRight']) keys['ArrowRight_held'] = false;
    if (!keys['gpRight']) shopGpRightHeld = false;

    // Confirm or cancel
    if (!shopConfirmReleaseRequired && ((keys['Enter'] && !keys['Enter_held']) || (keys['KeyE'] && !keys['KeyE_held']) || (keys['gpJump'] && !keys['gpJump_held']))) {
      if (shopConfirmSelection === 0) { // Yes / Go
        confirmAccept();
      } else {
        closeConfirm();
      }
      if (keys['Enter']) keys['Enter_held'] = true;
      if (keys['KeyE']) keys['KeyE_held'] = true;
      if (keys['gpJump']) keys['gpJump_held'] = true;
    }
    if (!keys['Enter']) keys['Enter_held'] = false;
    if (!keys['KeyE']) keys['KeyE_held'] = false;
    if (!keys['gpJump']) keys['gpJump_held'] = false;

    // Cancel with Escape or gamepad B (both now require press-release)
    if ((keys['Escape'] && !keys['Escape_held']) || (keys['gpB'] && !keys['gpB_held'])) {
      closeConfirm();
      if (keys['Escape']) keys['Escape_held'] = true;
      if (keys['gpB']) keys['gpB_held'] = true;
    }
    if (!keys['Escape']) keys['Escape_held'] = false;
    if (!keys['gpB']) keys['gpB_held'] = false;
  }
}

// Execute the action represented by the current confirmation dialog.
function confirmAccept() {
  if (shopConfirmMode === 'proceed') {
    closeConfirm();
    startGame();
    return;
  }
  if (shopConfirmMode === 'replay') {
    // Roll the target level back to the one the player just completed.
    currentLevel = lastCompletedLevel;
    levelDeathCount = 0;
    closeConfirm();
    startGame();
    return;
  }
  purchaseSelectedGuitar();
  closeConfirm();
}

// ---- Receipt ----
function updateReceipt() {
  receiptTimer++;
  
  // Handle key press for skipping (one-shot to avoid immediate transition to game start)
  if (!keys['Space_skip_held'] && !keys['Enter_skip_held']) {
    if (keys['Space'] || keys['Enter'] || keys['gpStart'] || keys['gpJump']) {
      keys['Space_skip_held'] = true;
    }
  }
  
  // Auto-advance to shop after 4 seconds (240 frames at 60fps) or on key press
  if (receiptTimer > 240 || keys['Space_skip_held']) {
    shopSound();
    gameState = 'shop';
    shopCol = 0;
    shopRow = 0;
    receiptTimer = 0;
    keys['Space_skip_held'] = false;
  }
}

function drawReceipt() {

  ctx.fillText(receiptTitle, 400 - receiptTitleWidth / 2, 60);

  // Transaction ID & date
  ctx.font = '12px Consolas, "Courier New", monospace';
  ctx.fillStyle = '#333';
  const txnId = 'TXN: #' + Math.floor(Math.random() * 100000).toString().padStart(5, '0');
  const txnIdWidth = ctx.measureText(txnId).width;
  ctx.fillText(txnId, 400 - txnIdWidth / 2, 80);
  
  const dateStr = new Date().toLocaleDateString();
  const dateWidth = ctx.measureText(dateStr).width;
  ctx.fillText(dateStr, 400 - dateWidth / 2, 95);

  // Separator
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(135, 105, 530, 1);

  // Items header
  ctx.fillStyle = '#333';
  ctx.font = 'bold 13px Consolas, "Courier New", monospace';
  ctx.fillText('ITEM', 140, 130);
  ctx.fillText('QTY', 380, 130);
  ctx.fillText('PRICE', 450, 130);
  ctx.fillText('TOTAL', 530, 130);

  // Items list
  ctx.font = '12px Consolas, "Courier New", monospace';
  let yPos = 155;
  let grandTotal = 0;
  const maxItems = 6;
  
  for (let i = 0; i < Math.min(receipItemsList.length, maxItems); i++) {
    const item = receipItemsList[i];
    const itemTotal = item.total;
    grandTotal += itemTotal;

    // Item name (truncated if too long)
    const name = item.name.length > 20 ? item.name.substring(0, 17) + '...' : item.name;
    ctx.fillStyle = '#333';
    ctx.fillText(name, 140, yPos);
    
    // Quantity
    ctx.fillText('x' + item.quantity, 385, yPos);
    
    // Unit price
    ctx.fillText(item.unitPrice + '¢', 455, yPos);
    
    // Total
    ctx.fillStyle = '#8b6914';
    ctx.fillText(itemTotal + '¢', 530, yPos);
    
    yPos += 22;
  }

  // Separator
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(135, yPos, 530, 1);
  yPos += 12;

  // Subtotal
  ctx.fillStyle = '#333';
  ctx.font = '13px Consolas, "Courier New", monospace';
  ctx.fillText('Subtotal:', 380, yPos);
  ctx.fillStyle = '#8b6914';
  ctx.fillText(grandTotal + '¢', 520, yPos);
  yPos += 22;

  // Tax (10%)
  const tax = Math.floor(grandTotal * 0.1);
  ctx.fillStyle = '#333';
  ctx.fillText('Tax (10%):', 380, yPos);
  ctx.fillStyle = '#8b6914';
  ctx.fillText(tax + '¢', 520, yPos);
  yPos += 22;

  // Total separator
  ctx.fillStyle = '#8b6914';
  ctx.fillRect(135, yPos - 8, 530, 2);

  // Grand Total
  yPos += 8;
  ctx.fillStyle = '#8b6914';
  ctx.font = 'bold 16px Consolas, "Courier New", monospace';
  const finalTotal = grandTotal + tax;
  ctx.fillText('TOTAL: ' + finalTotal + '¢', 450, yPos);

  // Footer message
  ctx.fillStyle = '#666';
  ctx.font = '11px Consolas, "Courier New", monospace';
  const thanks = 'Thank you for your punk!';
  const thanksWidth = ctx.measureText(thanks).width;
  ctx.fillText(thanks, 400 - thanksWidth / 2, 410);

  // Continue hint (fade in/out)
  const blinkAlpha = Math.abs(Math.sin(receiptTimer * 0.05));
  ctx.fillStyle = 'rgba(139, 105, 20, ' + (0.3 + blinkAlpha * 0.4) + ')';
  ctx.font = '11px Consolas, "Courier New", monospace';
  const continueText = '[PRESS SPACE / A to continue]';
  const continueWidth = ctx.measureText(continueText).width;
  ctx.fillText(continueText, 400 - continueWidth / 2, 435);
}
