  keys['gpJump_held'] = keys['gpJump'];
  keys['gpStart_held'] = keys['gpStart'];
  keys['gpB_held'] = keys['gpB'];
}

function resetPlayer() {
  player.x = 80;
  player.y = 404;
  player.vx = 0;
  player.vy = 0;
  player.onGround = false;
  player.invincible = false;
  player.invincibleTimer = 0;
  player.attacking = false;
  player.attackTimer = 0;
  player.attackCooldown = 0;
  player.coyoteTimer = 0;
  player.jumpBufferTimer = 0;
  player.jumpHeld = false;
}

// ---- Camera ----
function updateCamera() {
  const target = player.x - 300;
  camX += (target - camX) * 0.1;
  camX = Math.max(0, Math.min(camX, LEVEL_W - GAME_W));
}

// ---- Physics ----
const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const SPEED = 2.8;           // max horizontal speed (slightly higher to keep pace lively)
const MAX_FALL = 10;
// Smooth-movement tuning - acceleration-based horizontal control instead of
// snapping instantly to full speed. Ground is grippier; air control is looser
// so you can still course-correct mid-jump but not as sharply.
const ACCEL_GROUND   = 0.42;
const ACCEL_AIR      = 0.26;
const FRICTION_GROUND = 0.80;
const FRICTION_AIR    = 0.95;
const COYOTE_FRAMES   = 6;   // can still jump up to 6 frames after leaving a ledge
const JUMP_BUFFER_FRAMES = 6; // pressing jump up to 6 frames before landing still jumps
const JUMP_CUT_GRAVITY = 0.55; // multiplier applied to rising vy when jump is released

function rects(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ---- Update ----
function update() {
  if (gameState === 'start') {
    updateStartScreen();
    return;
  }
  if (gameState === 'settings') {
    updateSettingsScreen();
    return;
  }
  if (gameState === 'paused') {
    updatePauseScreen();
    return;
  }
  if (gameState !== 'playing') return;

  // Pause trigger: Escape key or gamepad Start button opens the pause menu.
  if ((keys['Escape'] && !keys['Escape_held']) || (keys['gpStart'] && !keys['gpStart_held'])) {
    gameState = 'paused';
    pauseSelection = 0;
    keys['Escape_held'] = true;
    keys['gpStart_held'] = true;
    if (bgGain) stopBackgroundMusic();
    return;
  }
  if (!keys['Escape']) keys['Escape_held'] = false;
  if (!keys['gpStart']) keys['gpStart_held'] = false;

  // Invincibility timer
  if (player.invincible) {
    player.invincibleTimer--;
    if (player.invincibleTimer <= 0) player.invincible = false;
  }

  // Attack cooldown
  if (player.attackCooldown > 0) player.attackCooldown--;

  if (player.performing) {
    // Outro performance: ignore player input, auto-walk to center stage, then
    // shred on guitar in a continuous loop. No jumping, no directional control.
    const center = GAME_W / 2 - player.w / 2;
    const dx = center - player.x;
    if (Math.abs(dx) > 3) {
      player.vx = Math.sign(dx) * 2.4;
      player.facing = player.vx > 0 ? 1 : -1;
    } else {
      player.x = center;
      player.vx = 0;
      player.facing = 1;
      // Keep swinging the guitar in a loop to sell the performance.
      if (!player.attacking && player.attackCooldown === 0 && player.hasGuitar) {
        player.attacking = true;
        player.attackTimer = 15;
        player.attackCooldown = 8; // faster than normal - this is a solo
      }
    }
    if (player.attacking) {
      player.attackTimer--;
      if (player.attackTimer <= 0) player.attacking = false;
    }
  } else {
    // Attack input (keyboard or gamepad)
    if ((keys['KeyE'] || keys['KeyJ'] || keys['gpAttack']) && !player.attacking && player.attackCooldown === 0 && player.hasGuitar) {
      player.attacking = true;
      player.attackTimer = 15;
      player.attackCooldown = 30;
      attackSound();
    }

    // Attack animation
    if (player.attacking) {
      player.attackTimer--;
      if (player.attackTimer <= 0) player.attacking = false;
    }

    // --- Smooth horizontal control ---
    // Refresh coyote time while on ground, decay it once airborne.
    if (player.onGround) player.coyoteTimer = COYOTE_FRAMES;
    else if (player.coyoteTimer > 0) player.coyoteTimer--;
    if (player.jumpBufferTimer > 0) player.jumpBufferTimer--;

    const left  = keys['ArrowLeft']  || keys['KeyA'] || keys['gpLeft'];
    const right = keys['ArrowRight'] || keys['KeyD'] || keys['gpRight'];
    const accel    = player.onGround ? ACCEL_GROUND    : ACCEL_AIR;
    const friction = player.onGround ? FRICTION_GROUND : FRICTION_AIR;

    if (left && !right) {
      player.vx = Math.max(player.vx - accel, -SPEED);
      player.facing = -1;
    } else if (right && !left) {
      player.vx = Math.min(player.vx + accel, SPEED);
      player.facing = 1;
    } else {
      player.vx *= friction;
      if (Math.abs(player.vx) < 0.05) player.vx = 0;
    }

    // --- Jump with buffer + coyote time + variable height ---
    const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || keys['gpJump'] || keys['gpUp'];
    // Rising edge -> buffer the jump press.
    if (jumpPressed && !player.jumpHeld) player.jumpBufferTimer = JUMP_BUFFER_FRAMES;
    // Consume a buffered jump while we still have ground or coyote grace.
    if (player.jumpBufferTimer > 0 && player.coyoteTimer > 0) {
      player.vy = JUMP_FORCE;
      player.onGround = false;
      player.coyoteTimer = 0;
      player.jumpBufferTimer = 0;
      jumpSound();
    }
    // Variable jump height: releasing jump while still rising cuts the arc.
    if (!jumpPressed && player.jumpHeld && player.vy < 0) {
      player.vy *= JUMP_CUT_GRAVITY;
    }
    player.jumpHeld = jumpPressed;

    // --- Distortion pedal activation (F key) ---
    // Rising-edge only so one tap = one stomp. Requires a charge AND that the
    // lockout has expired. Triggering starts the stomp animation and damages
    // every enemy inside PEDAL_RADIUS around the player on the frame of impact.
    if (player.pedalCooldown > 0) player.pedalCooldown--;
    if (player.pedalActive) {
      player.pedalTimer--;
      if (player.pedalTimer <= 0) player.pedalActive = false;
    }
    const pedalPressed = keys['KeyF'] || keys['gpPedal'];
    if (pedalPressed && !player.pedalKeyHeld &&
        player.pedalCharges > 0 && player.pedalCooldown <= 0 && !player.pedalActive) {
      triggerDistortionPedal();
    }
    player.pedalKeyHeld = pedalPressed;
  }

  // Physics
  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x > LEVEL_W - player.w) player.x = LEVEL_W - player.w;

  player.y += player.vy;
  player.onGround = false;

  // Platform collisions
  for (const p of platforms) {
    if (rects(player, p)) {
      const prevBottom = player.y + player.h - player.vy;
      if (prevBottom <= p.y && player.vy >= 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0 && player.y >= p.y + p.h - 10) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Fall death
  if (player.y > 520) {
    lives--;
    if (lives <= 0) {
      gameState = 'gameover';
      levelDeathCount++;
      playerDeathSound();
    }
    else resetPlayer();
  }

  // Beer collection
  for (const c of beerCans) {
    if (!c.collected && rects(player, { x: c.x - 12, y: c.y - 12, w: 24, h: 24 })) {
      c.collected = true;
      beerCollected++;
      if (c.golden) {
        if (lives < 3) {
          // Missing hearts -> restore one. No score bonus.
          lives++;
        } else {
          // Full health -> reward with 50 beer points.
          score += 50;
        }
        winSound();
      } else {
        score += 10;
        coinSound();
      }
    }
  }

  // --- High-altitude reward pickups ---
  // Walking through the glowing reward on its high ledge grants either a heart
  // (capped at MAX_LIVES) or a distortion-pedal charge (capped at MAX_PEDAL_CHARGES).
  for (const r of rewardPickups) {
    if (r.collected) continue;
    r.bobTimer += 0.12;
    const pickRect = { x: r.x - 14, y: r.y - 14, w: 28, h: 28 };
    if (rects(player, pickRect)) {
      r.collected = true;
      if (r.type === 'heart') {
        if (lives < MAX_LIVES) lives++;
        else score += 50;
        winSound();
      } else if (r.type === 'pedal') {
        if (player.pedalCharges < MAX_PEDAL_CHARGES) player.pedalCharges++;
        else score += 50;
        buySound();
      }
    }
  }

  // --- Pedal effects (shockwaves / lingering visuals) ---
  for (let i = pedalEffects.length - 1; i >= 0; i--) {
    const fx = pedalEffects[i];
    fx.age++;
    if (fx.age >= fx.life) pedalEffects.splice(i, 1);
  }

  // Enemy update & collision
  for (const e of enemies) {
    if (!e.alive) continue;

    if (e.type === 'boss') {
      updateBossAI(e);
    } else if (e.type === 'dasher') {
      // Dashers: spawn just off the visible screen edge and sprint to the opposite
      // off-screen edge. They never appear or vanish within the visible area.
      if (!e.active) {
        e.respawn--;
        if (e.respawn <= 0) {
          const dir = Math.random() < 0.5 ? 1 : -1;
          e.vx = dir * e.speed;
          // Spawn just beyond the current visible screen edge.
          e.x = dir > 0 ? (camX - 80) : (camX + GAME_W + 80);
          e.active = true;
        }
      } else {
        e.x += e.vx;
        // Deactivate only once fully past the OPPOSITE visible-screen edge.
        const screenX = e.x - camX;
        if ((e.vx > 0 && screenX > GAME_W + 80) || (e.vx < 0 && screenX < -80)) {
          e.active = false;
          e.respawn = 180 + Math.floor(Math.random() * 180);
        }
      }
    } else if (e.verticalStops) {
      // Enemies with a vertical-patrol path (currently big-bots): horizontal patrol
      // within the current stop's [min, max], then periodic parabolic jumps to the
      // next stop at a different platform height.
      if (e.jumpPhase === 'jumping') {
        e.jumpProgress += 1 / 45; // ~0.75s jump
        if (e.jumpProgress >= 1) {
          e.jumpProgress = 1;
          e.x = e.jumpToX;
          e.y = e.jumpToY;
          e.jumpPhase = 'idle';
          e.jumpTimer = 180 + Math.floor(Math.random() * 180);
          // Adopt the new stop's patrol range.
          const stop = e.verticalStops[e.currentStop];
          e.min = stop.min;
          e.max = stop.max;
          // Clamp inside the new range in case we landed just past an edge.
          if (e.x < e.min) e.x = e.min;
          if (e.x > e.max) e.x = e.max;
        } else {
          const t = e.jumpProgress;
          // Parabolic arc with a visible hop height.
          const arcH = 70;
          const arc = -arcH * 4 * t * (1 - t);
          e.x = e.jumpFromX + (e.jumpToX - e.jumpFromX) * t;
          e.y = e.jumpFromY + (e.jumpToY - e.jumpFromY) * t + arc;
        }
      } else {
        // Normal horizontal patrol
        e.x += e.vx;
        if (e.x <= e.min || e.x >= e.max) e.vx *= -1;
        e.jumpTimer--;
        if (e.jumpTimer <= 0) {
          // Pick a different stop at random (at least 2 stops guaranteed).
          let nextStop = e.currentStop;
          while (nextStop === e.currentStop) {
            nextStop = Math.floor(Math.random() * e.verticalStops.length);
          }
          const target = e.verticalStops[nextStop];
          // Jump to a random X inside the target's range.
          const targetX = target.min + Math.random() * (target.max - target.min);
          e.jumpFromX = e.x;
          e.jumpFromY = e.y;
          e.jumpToX = targetX;
          e.jumpToY = target.y;
          e.jumpProgress = 0;
          e.jumpPhase = 'jumping';
          e.currentStop = nextStop;
        }
      }
    } else {
      e.x += e.vx;
      if (e.x <= e.min || e.x >= e.max) e.vx *= -1;
      // Flyers and drones bob vertically between minY and maxY.
      if (e.type === 'flyer' || e.type === 'drone') {
        e.y += e.vy;
        if (e.y <= e.minY || e.y >= e.maxY) e.vy *= -1;
      }
    }

    // Decay per-enemy timers.
    if (e.hitCooldown > 0) e.hitCooldown--;
    if (e.hitFlash > 0) e.hitFlash--;

    const isBrute = e.type === 'brute';
    const isDasher = e.type === 'dasher';
    const isRat = e.type === 'rat';
    const isDrone = e.type === 'drone';
    const isSoldier = e.type === 'soldier';
    const isBigbot = e.type === 'bigbot';
    const isBoss = e.type === 'boss';

    // Dashers that are off-screen do not collide or get drawn.
    if (isDasher && !e.active) continue;

    // Enemy hitboxes.
    let hbW = 28, hbH = 28;
    if (isBrute) { hbW = 40; hbH = 40; }
    else if (isRat) { hbW = 26; hbH = 18; }
    else if (isDasher) { hbW = 56; hbH = 32; }
    else if (isDrone) { hbW = 34; hbH = 26; }
    else if (isSoldier) { hbW = 30; hbH = 46; }
    else if (isBigbot) { hbW = 52; hbH = 60; }
    else if (isBoss) { hbW = 110; hbH = 130; }
    const enemyRect = { x: e.x - hbW / 2, y: e.y - hbH, w: hbW, h: hbH };

    // Guitar attack - AABB overlap between a tight swing hitbox and the enemy hitbox.
    // Dashers are armored: guitar attacks pass right through them.
    if (player.attacking && player.attackTimer > 2 && e.hitCooldown === 0 && !e.invulnerable) {
      const attackProgress = (15 - player.attackTimer) / 15;
      const gx = player.x + (player.facing > 0 ? 58 : -32);
      const gy = player.y - 18 + attackProgress * 38;
      const guitarRect = { x: gx - 18, y: gy - 8, w: 36, h: 54 };
      if (rects(guitarRect, enemyRect)) {
        const dmg = guitarTypes[player.guitarType].damage;
        e.hp -= dmg;
        e.hitCooldown = 18;
        e.hitFlash = 10;
        if (e.hp <= 0) {
          e.alive = false;
          enemiesKilled++;
          // Score rewards scale roughly with enemy HP / threat.
          if (isBoss) score += 1000;
          else if (isBigbot) score += 200;
          else if (isBrute) score += 120;
          else if (isSoldier) score += 90;
          else if (isDrone) score += 60;
          else score += 50;
          guitarKillSound();
          // Boss defeated: start the victory outro sequence.
          if (isBoss) {
            bossOutroTimer = 120;
            bossProjectiles.length = 0;
          }
        } else {
          hurtSound();
        }
        continue;
      }
    }

    if (rects(player, enemyRect)) {
      const prevBottom = player.y + player.h - player.vy;
      // Brutes, dashers, big-bots and the final boss cannot be stomped.
      const canStomp = !isBrute && !isDasher && !isBigbot && !isBoss;
      if (canStomp && prevBottom < e.y && player.vy > 0) {
        e.alive = false;
        enemiesKilled++;
        player.vy = -8;
        score += isSoldier ? 90 : (isDrone ? 60 : 50);
        killSound();
      } else if (!player.invincible) {
        lives--;
        if (lives <= 0) {
          gameState = 'gameover';
          levelDeathCount++;
          playerDeathSound();
        }
        else {
          player.invincible = true;
          player.invincibleTimer = 120;
          // Bounce player away from heavy enemies so they're not stuck in damage loop.
          if (isBrute || isBigbot || isBoss) {
            player.vy = -7;
            player.vx = player.x < e.x ? -5 : 5;
          }
        }
        hurtSound();
      }
    }
  }

  // Guitar swing can smash boss rockets mid-flight. A clean hit detonates the
  // rocket right where it is (far from the player) - a safe way to neutralize it.
  if (player.attacking && player.attackTimer > 2 && bossProjectiles.length > 0) {
    const progress = (15 - player.attackTimer) / 15;
    const gx = player.x + (player.facing > 0 ? 58 : -32);
    const gy = player.y - 18 + progress * 38;
    const guitarRect = { x: gx - 18, y: gy - 8, w: 36, h: 54 };
    for (const p of bossProjectiles) {
      if (p.exploding) continue;
      const pr = { x: p.x - 10, y: p.y - 10, w: 20, h: 20 };
      if (rects(guitarRect, pr)) {
        p.exploding = true;
        p.explodeTimer = p.explodeMaxTimer;
        // Slightly smaller blast when swatted away, and no damage to the player
        // (they just swung a guitar into it - that's their reward).
        p.explodeRadius = 30;
        p.didExplodeDamage = true;
        guitarKillSound();
      }
    }
  }

  // Poison drippers (level 4): ceiling sources periodically release acid drops
  // that fall until they hit the ground or the player. Only update drippers whose
  // source is reasonably near the screen to keep things cheap.
  for (const src of poisonSources) {
    const dx = src.x - camX;
    if (dx < -80 || dx > GAME_W + 80) continue;
    src.timer--;
    if (src.timer <= 0) {
      poisonDrops.push({ x: src.x, y: src.y + 10, vy: 0 });
      src.timer = src.interval + Math.floor(Math.random() * 40);
    }
  }
  for (let i = poisonDrops.length - 1; i >= 0; i--) {
    const d = poisonDrops[i];
    d.vy += 0.42;
    if (d.vy > 11) d.vy = 11;
    d.y += d.vy;

    // Splat on ground.
    if (d.y > 442) {
      poisonDrops.splice(i, 1);
      continue;
    }
    // Hit the player.
    const dropRect = { x: d.x - 3, y: d.y - 5, w: 6, h: 10 };
    if (!player.invincible && rects(player, dropRect)) {
      lives--;
      if (lives <= 0) {
        gameState = 'gameover';
        levelDeathCount++;
        playerDeathSound();
      } else {
        player.invincible = true;
        player.invincibleTimer = 120;
      }
      hurtSound();
      poisonDrops.splice(i, 1);
    }
  }

  // Boss projectiles (active only during the boss fight).
  updateBossProjectiles();

  // Boss defeated - wait for the short death animation to elapse, then kick off
  // the "performance" phase (hero walks to center stage and shreds on guitar)
  // before the VICTORY screen with stats appears.
  if (bossActive && bossOutroTimer > 0) {
    bossOutroTimer--;
    if (bossOutroTimer <= 0) {
      totalBeer += score;
      bossActive = false;
      // Persist the boss victory so the DIY Punk Guitar unlocks in the shop
      // on any subsequent playthrough (including after a page reload).
      markBossBeaten();
      // Start the celebratory performance phase - heavy metal outro.
      performanceActive = true;
      performanceTimer = PERFORMANCE_DURATION;
      player.performing = true;
      runEndMs = Date.now();
      // Swap from boss theme to victory metal theme.
      stopBackgroundMusic();
      startBackgroundMusic('victory');
    }
  }

  // Performance phase: hero is auto-walking to center and playing guitar.
  // Count down, then hand off to the VICTORY screen.
  if (performanceActive) {
    performanceTimer--;
    if (performanceTimer <= 0) {
      performanceActive = false;
      player.performing = false;
      winSound();
      gameState = 'victory';
      stopBackgroundMusic();
    }
  }

  // Win flag - advance to the next level after the shop, OR enter the boss arena
  // at the end of level 5 (instead of the usual shop transition).
  if (!bossActive && player.x + player.w > player.goalX) {
    if (currentLevel === 5) {
      // End of the neon city run: step into the boss arena.
      lastCompletedLevel = currentLevel;
      winSound();
      enterBossArena();
    } else {
      totalBeer += score;
      winSound();
      lastCompletedLevel = currentLevel;
      currentLevel = (currentLevel % TOTAL_LEVELS) + 1;
      levelDeathCount = 0; // Fresh attempts on the new level.
      gameState = 'shop';
      shopCol = 0;
      shopRow = 0;
      shopFocus = 'grid';
      shopFooterSel = 1;
    }
  }

  // Animation
  if (Math.abs(player.vx) > 0.5) {
    player.animTimer++;
    if (player.animTimer > 8) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  } else {
    player.animFrame = 0;
    player.animTimer++;
  }

  updateCamera();
}

// Handle scene transitions (keyboard + gamepad)
function handleGameStateTransitions() {
  if (!keys['Space_transition_held'] && !keys['Enter_transition_held']) {
    if (keys['Space']) keys['Space_transition_held'] = true;
    if (keys['Enter'] || keys['gpStart'] || keys['gpJump']) keys['Enter_transition_held'] = true;
  }

  if (keys['Space_transition_held'] || keys['Enter_transition_held']) {
    if (gameState === 'gameover') {
      audioCtx.resume();
      if (bossActive) {
        // Dying in the boss arena: retry the fight directly (unlimited tries).
        lives = 3;
        score = 0;
        resetPlayer();
        enterBossArena();
        gameState = 'playing';
      } else if (currentLevel > 1 && levelDeathCount < MAX_DEATHS_PER_LEVEL) {
        // On non-first levels the player gets up to MAX_DEATHS_PER_LEVEL tries
        // before being kicked back to level 1. Level 1 always restarts fresh.
        startGame();
      } else {
        currentLevel = 1;
        levelDeathCount = 0;
        startGame();
      }
    } else if (gameState === 'victory') {
      // Back to the main menu after the final fanfare.
      audioCtx.resume();
      currentLevel = 1;
      levelDeathCount = 0;
      lastCompletedLevel = 0;
      bossActive = false;
      gameState = 'start';
    }
    keys['Space_transition_held'] = false;
    keys['Enter_transition_held'] = false;
  }

  if (!keys['Space'] && !keys['Enter'] && !keys['gpStart'] && !keys['gpJump']) {
    keys['Space_transition_held'] = false;
    keys['Enter_transition_held'] = false;
  }
}

// ---- Draw ----
// Draw a pixel-art guitar shape - faces right by default
function drawGuitarShape(x, y, facing, guitarIdx, isAttacking, attackTimerVal) {
  const g = guitarTypes[guitarIdx];
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) ctx.scale(-1, 1);

  // Glow for expensive guitars
  if (guitarIdx >= 4) {
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 10;
  }

  // Attack swing rotation
  if (isAttacking) {
    const rotation = -118 + (15 - attackTimerVal) / 15 * 132;
    ctx.translate(40, 12);
    ctx.rotate(rotation * Math.PI / 180);
    ctx.translate(-40, -12);
  }

  const c = g.color;
  const dark = '#1a1a1a';
  const metal = '#c0c0c0';
  const str = '#efefef';
  const pickb = '#1a1a1a';
  const wood = '#3a2a1a';
  const fretboard = '#2a2020';

  if (guitarImagesReady && guitarImages[g.shape] && guitarImages[g.shape].complete) {
    const img = guitarImages[g.shape];
    ctx.drawImage(img, -26, -16, 52, 38);
    ctx.restore();
    return;
  }

  switch (g.shape) {
    case 'strat':
      // Stratocaster: classic Fender with sunburst finish
      // Main body - sunburst gradient effect (dark edges, lighter center)
      // Outer darker edge
      ctx.fillStyle = '#4a1a0a';
      ctx.beginPath();
      ctx.moveTo(8, 13);
      ctx.bezierCurveTo(6, 16, 6, 18, 7, 22);
      ctx.bezierCurveTo(8, 26, 14, 28, 18, 28);
      ctx.bezierCurveTo(22, 28, 24, 27, 25, 26);
      ctx.lineTo(27, 20);
      ctx.bezierCurveTo(28, 16, 26, 12, 22, 10);
      ctx.bezierCurveTo(18, 8, 12, 8, 8, 13);
      ctx.closePath();
      ctx.fill();
      
      // Mid-tone body
      ctx.fillStyle = '#8b4513';
      ctx.beginPath();
      ctx.moveTo(10, 14);
      ctx.bezierCurveTo(8, 17, 8, 19, 9, 23);
      ctx.bezierCurveTo(10, 26, 15, 27, 18, 27);
      ctx.bezierCurveTo(21, 27, 23, 26, 24, 25);
      ctx.lineTo(26, 19);
      ctx.bezierCurveTo(27, 15, 25, 11, 21, 9);
      ctx.bezierCurveTo(17, 8, 12, 8, 10, 14);
      ctx.closePath();
      ctx.fill();
      
      // Lighter center sunburst
      ctx.fillStyle = '#d4a574';
      ctx.beginPath();
      ctx.moveTo(12, 15);
      ctx.bezierCurveTo(10, 18, 10, 20, 11, 24);
      ctx.bezierCurveTo(12, 25, 16, 26, 18, 26);
      ctx.bezierCurveTo(20, 26, 22, 25, 23, 24);
      ctx.lineTo(25, 18);
      ctx.bezierCurveTo(26, 14, 24, 10, 20, 9);
      ctx.bezierCurveTo(16, 8, 13, 9, 12, 15);
      ctx.closePath();
      ctx.fill();
      
      // White pickguard
      ctx.fillStyle = '#f5f5f0';
      ctx.beginPath();
      ctx.moveTo(12, 17);
      ctx.lineTo(24, 15);
      ctx.lineTo(24, 24);
      ctx.lineTo(14, 25);
      ctx.lineTo(12, 22);
      ctx.closePath();
      ctx.fill();
      
      // Pickguard edge shadow
      ctx.strokeStyle = 'rgba(0,0,0,0.3)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      
      // Neck (maple/lighter wood)
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(28, 12, 19, 4);
      
      // Fretboard (darker)
      ctx.fillStyle = '#2a2020';
      ctx.fillRect(28, 12, 19, 2);
      
      // Frets (metal)
      ctx.strokeStyle = '#c0c0c0';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 6; i++) {
        ctx.beginPath();
        ctx.moveTo(28 + i * 3.2, 12);
        ctx.lineTo(28 + i * 3.2, 14);
        ctx.stroke();
      }
      
      // Headstock (classic Fender shape)
      ctx.fillStyle = '#d2b48c';
      ctx.beginPath();
      ctx.moveTo(48, 9);
      ctx.lineTo(57, 7);
      ctx.lineTo(59, 8);
      ctx.lineTo(59, 14);
      ctx.lineTo(57, 15);
      ctx.lineTo(48, 16);
      ctx.closePath();
      ctx.fill();
      
      // Headstock logo area
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(50, 10, 6, 2);
      
      // Tuning pegs (6 in 3x2 configuration)
      ctx.fillStyle = '#a0a0a0';
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 10 + i * 2.5, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(58, 10 + i * 2.5, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // Body pickups (3 single coils - white)
      ctx.fillStyle = '#f5f5f0';
      ctx.fillRect(21, 13, 3.5, 2.5);
      ctx.fillRect(21, 18, 3.5, 2.5);
      ctx.fillRect(21, 23, 3.5, 2.5);
      
      // Pickup poles (black/dark)
      ctx.fillStyle = '#1a1a1a';
      for (let j = 0; j < 3; j++) {
        for (let i = 0; i < 6; i++) {
          ctx.fillRect(21.8 + i * 0.5, 13.5 + j * 5, 0.3, 1.5);
        }
      }
      
      // Tremolo bridge (vibrato system)
      ctx.fillStyle = '#c0c0c0';
      ctx.fillRect(15, 26, 12, 1.5);
      ctx.fillStyle = '#888888';
      ctx.fillRect(16, 26.5, 10, 0.5);
      
      // Bridge saddles
      ctx.fillStyle = '#a0a0a0';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(16.5 + i * 1.5, 25.5, 0.8, 1.5);
      }
      
      // Control knobs (volume, tone)
      ctx.fillStyle = '#333333';
      ctx.beginPath();
      ctx.arc(9, 19, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(9, 24, 1.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Strings
      ctx.strokeStyle = '#e8e8e8';
      ctx.lineWidth = 0.7;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12.8 + i * 0.9);
        ctx.lineTo(58, 12.8 + i * 0.9);
        ctx.stroke();
      }
      
      // Body outline (subtle)
      ctx.strokeStyle = 'rgba(0,0,0,0.4)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(8, 13);
      ctx.bezierCurveTo(6, 16, 6, 18, 7, 22);
      ctx.bezierCurveTo(8, 26, 14, 28, 18, 28);
      ctx.bezierCurveTo(22, 28, 24, 27, 25, 26);
      ctx.lineTo(27, 20);
      ctx.bezierCurveTo(28, 16, 26, 12, 22, 10);
      ctx.bezierCurveTo(18, 8, 12, 8, 8, 13);
      ctx.closePath();
      ctx.stroke();
      break;

    case 'mustang':
      // Telecaster: squared single-cutaway, clean design
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(10, 13);
      ctx.lineTo(23, 11);
      ctx.lineTo(26, 17);
      ctx.lineTo(26, 25);
      ctx.lineTo(20, 27);
      ctx.lineTo(10, 27);
      ctx.lineTo(6, 19);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 12, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 13, 19, 2);
      // Headstock (Fender single-col)
      ctx.fillStyle = wood;
      ctx.fillRect(48, 9, 10, 8);
      // Tuning pegs (3x2)
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(50, 11 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(56, 11 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body pickups (2 single coils)
      ctx.fillStyle = pickb;
      ctx.fillRect(22, 14, 4, 2);
      ctx.fillRect(22, 22, 4, 2);
      // Bridge plate
      ctx.fillStyle = metal;
      ctx.fillRect(14, 27, 12, 1);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 13 + i * 1.5);
        ctx.lineTo(58, 13 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'jaguar':
      // Jaguar: offset single-cutaway with unique curves
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(12, 13);
      ctx.lineTo(24, 11);
      ctx.lineTo(27, 17);
      ctx.lineTo(27, 25);
      ctx.lineTo(20, 27);
      ctx.lineTo(10, 27);
      ctx.lineTo(4, 21);
      ctx.lineTo(6, 15);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 12, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 12.5, 19, 2.5);
      // Headstock
      ctx.fillStyle = wood;
      ctx.fillRect(48, 8, 12, 9);
      // Chrome pickguard area
      ctx.fillStyle = '#e8e0d0';
      ctx.fillRect(8, 16, 10, 10);
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 11 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(59, 11 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body pickups (2 jazzmaster style)
      ctx.fillStyle = pickb;
      ctx.fillRect(20, 14, 4, 2.5);
      ctx.fillRect(20, 22, 4, 2.5);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 13 + i * 1.5);
        ctx.lineTo(58, 13 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'lespaul':
      // Les Paul: thick single cutaway with arched top
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(8, 13);
      ctx.lineTo(24, 11);
      ctx.lineTo(27, 18);
      ctx.lineTo(27, 26);
      ctx.lineTo(20, 28);
      ctx.lineTo(8, 28);
      ctx.lineTo(6, 20);
      ctx.closePath();
      ctx.fill();
      // Arched top (lighter shade)
      ctx.fillStyle = '#d4a574';
      ctx.fillRect(9, 14, 14, 10);
      // Top edge highlight
      ctx.strokeStyle = '#e8c888';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(9, 14, 14, 10);
      // Neck (thick)
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 5);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 11.5, 19, 3.5);
      // Headstock (big 6-in-line)
      ctx.fillStyle = wood;
      ctx.fillRect(48, 8, 12, 9);
      ctx.fillStyle = '#b8944a';
      ctx.fillRect(49, 8.5, 10, 8);
      // Tuning pegs (3x2)
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 11 + i * 2, 1.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(59, 11 + i * 2, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbuckers
      ctx.fillStyle = pickb;
      ctx.fillRect(18, 15, 5, 2.5);
      ctx.fillRect(18, 23, 5, 2.5);
      ctx.fillStyle = metal;
      ctx.fillRect(18.5, 15.5, 4, 1.5);
      ctx.fillRect(18.5, 23.5, 4, 1.5);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(14, 27, 10, 1.5);
      // Control knobs
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.arc(11, 20, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(11, 25, 1.5, 0, Math.PI * 2);
      ctx.fill();
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 13 + i * 1.2);
        ctx.lineTo(58, 13 + i * 1.2);
        ctx.stroke();
      }
      break;

    case 'superstart':
      // Superstrat: aggressive pointed, sharp design
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(10, 11);
      ctx.lineTo(24, 9);
      ctx.lineTo(28, 16);
      ctx.lineTo(28, 25);
      ctx.lineTo(20, 28);
      ctx.lineTo(6, 26);
      ctx.lineTo(4, 15);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 11.5, 19, 2.5);
      // Headstock (angular)
      ctx.fillStyle = wood;
      ctx.beginPath();
      ctx.moveTo(48, 8);
      ctx.lineTo(60, 6);
      ctx.lineTo(60, 14);
      ctx.lineTo(48, 16);
      ctx.closePath();
      ctx.fill();
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 10 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(57, 10 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbuckers (2)
      ctx.fillStyle = pickb;
      ctx.fillRect(22, 13, 4, 2.5);
      ctx.fillRect(22, 21, 4, 2.5);
      ctx.fillStyle = metal;
      ctx.fillRect(22.5, 13.5, 3, 1.5);
      ctx.fillRect(22.5, 21.5, 3, 1.5);
      // Floyd Rose bridge
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 12, 2);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12.5 + i * 1.5);
        ctx.lineTo(58, 12.5 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'explorer':
      // Explorer: geometric angular shape with horns
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(16, 10);
      ctx.lineTo(24, 12);
      ctx.lineTo(26, 18);
      ctx.lineTo(28, 20);
      ctx.lineTo(26, 26);
      ctx.lineTo(14, 28);
      ctx.lineTo(10, 26);
      ctx.lineTo(6, 20);
      ctx.lineTo(8, 16);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 12, 19, 2);
      // Headstock (Explorer style - angled)
      ctx.fillStyle = wood;
      ctx.beginPath();
      ctx.moveTo(48, 8);
      ctx.lineTo(60, 5);
      ctx.lineTo(60, 15);
      ctx.lineTo(48, 16);
      ctx.closePath();
      ctx.fill();
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 9 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(57, 9 + i * 2.5, 1, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbuckers
      ctx.fillStyle = pickb;
      ctx.fillRect(18, 14, 5, 2.5);
      ctx.fillRect(18, 22, 5, 2.5);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12.5 + i * 1.5);
        ctx.lineTo(58, 12.5 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'vshape':
      // Flying V / V-Guitar: sharp V-shaped body
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(26, 10);
      ctx.lineTo(30, 14);
      ctx.lineTo(32, 24);
      ctx.lineTo(26, 26);
      ctx.lineTo(20, 24);
      ctx.lineTo(18, 14);
      ctx.closePath();
      ctx.fill();
      // Lower V wings
      ctx.fillRect(8, 18, 10, 4);
      ctx.fillRect(32, 18, 10, 4);
      ctx.strokeStyle = dark;
      ctx.lineWidth = 1;
      ctx.stroke();
      // Neck
      ctx.fillStyle = wood;
      ctx.fillRect(28, 11, 19, 4);
      // Fretboard
      ctx.fillStyle = fretboard;
      ctx.fillRect(28, 12, 19, 2);
      // Headstock
      ctx.fillStyle = wood;
      ctx.beginPath();
      ctx.moveTo(48, 9);
      ctx.lineTo(60, 6);
      ctx.lineTo(60, 14);
      ctx.lineTo(48, 15);
      ctx.closePath();
      ctx.fill();
      // Tuning pegs
      ctx.fillStyle = metal;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.arc(51, 9.5 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(57, 9.5 + i * 2, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      // Body humbucker (center)
      ctx.fillStyle = pickb;
      ctx.fillRect(25, 15, 4, 3);
      ctx.fillStyle = metal;
      ctx.fillRect(25.5, 15.5, 3, 2);
      // Bridge
      ctx.fillStyle = metal;
      ctx.fillRect(24, 25, 6, 1.5);
      // Strings
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(28, 12 + i * 1.5);
        ctx.lineTo(58, 12 + i * 1.5);
        ctx.stroke();
      }
      break;

    case 'firebird':
      // Firebird fallback shape
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(10, 12);
      ctx.lineTo(24, 9);
      ctx.lineTo(30, 14);
      ctx.lineTo(30, 26);
      ctx.lineTo(24, 28);
      ctx.lineTo(10, 24);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(28, 12, 19, 4);
      ctx.fillStyle = '#2a2020';
      ctx.fillRect(28, 13, 19, 2);
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(28, 13);
      ctx.lineTo(58, 13);
      ctx.stroke();
      break;

    case 'iceman':
      // Iceman fallback shape
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(12, 10);
      ctx.lineTo(26, 9);
      ctx.lineTo(30, 16);
      ctx.lineTo(27, 26);
      ctx.lineTo(20, 28);
      ctx.lineTo(10, 24);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#d2b48c';
      ctx.fillRect(28, 12, 19, 4);
      ctx.fillStyle = '#2a2020';
      ctx.fillRect(28, 13, 19, 2);
      ctx.fillStyle = metal;
      ctx.fillRect(16, 26, 10, 1.5);
      ctx.strokeStyle = str;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(28, 13);
      ctx.lineTo(58, 13);
      ctx.stroke();
      break;
  }

  ctx.restore();
}

// Draw guitar on player's back
function drawGuitarOnBack(x, y, facing, guitarIdx) {
  const g = guitarTypes[guitarIdx];
  ctx.save();
  ctx.translate(x + 14, y);
  if (facing < 0) ctx.scale(-1, 1);

  ctx.fillStyle = g.color;
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  
  // Simplified back view matched to guitar type
  switch (g.shape) {
    case 'strat':
      // Strat on back
      ctx.beginPath();
      ctx.moveTo(22, 16);
      ctx.lineTo(32, 14);
      ctx.lineTo(34, 22);
      ctx.lineTo(34, 28);
      ctx.lineTo(26, 30);
      ctx.lineTo(20, 26);
      ctx.closePath();
      ctx.fill();
      break;
    case 'mustang':
      // Telecaster on back
      ctx.fillRect(22, 16, 12, 14);
      break;
    case 'jaguar':
      // Jaguar on back
      ctx.beginPath();
      ctx.moveTo(24, 14);
      ctx.lineTo(34, 12);
      ctx.lineTo(36, 20);
      ctx.lineTo(36, 28);
      ctx.lineTo(26, 30);
      ctx.lineTo(20, 26);
      ctx.closePath();
      ctx.fill();
      break;
    case 'lespaul':
      // Les Paul on back (thick)
      ctx.fillRect(20, 14, 16, 16);
      break;
    case 'superstart':
      // Superstrat on back
      ctx.beginPath();
      ctx.moveTo(22, 12);
      ctx.lineTo(34, 10);
      ctx.lineTo(36, 20);
      ctx.lineTo(36, 28);
      ctx.lineTo(24, 30);
      ctx.lineTo(18, 24);
      ctx.closePath();
      ctx.fill();
      break;
    case 'explorer':
      // Explorer on back
      ctx.beginPath();
      ctx.moveTo(26, 12);
      ctx.lineTo(36, 14);
      ctx.lineTo(36, 26);
      ctx.lineTo(26, 30);
      ctx.lineTo(16, 26);
      ctx.lineTo(16, 14);
      ctx.closePath();
      ctx.fill();
      break;
    case 'vshape':
      // V-Guitar on back (compact)
      ctx.beginPath();
      ctx.moveTo(28, 12);
      ctx.lineTo(32, 16);
      ctx.lineTo(34, 26);
      ctx.lineTo(28, 28);
      ctx.lineTo(22, 26);
      ctx.lineTo(24, 16);
      ctx.closePath();
      ctx.fill();
      break;
    case 'firebird':
      ctx.beginPath();
      ctx.moveTo(22, 14);
      ctx.lineTo(32, 12);
      ctx.lineTo(36, 20);
      ctx.lineTo(36, 28);
      ctx.lineTo(24, 30);
      ctx.lineTo(18, 24);
      ctx.closePath();
      ctx.fill();
      break;
    case 'iceman':
      ctx.beginPath();
      ctx.moveTo(20, 12);
      ctx.lineTo(34, 11);
      ctx.lineTo(37, 20);
      ctx.lineTo(33, 28);
      ctx.lineTo(22, 30);
      ctx.lineTo(16, 22);
      ctx.closePath();
      ctx.fill();
      break;
  }
  
  // Neck visible from back
  ctx.fillRect(32, 12, 14, 3);
  // Headstock silhouette
  ctx.fillRect(46, 10, 6, 4);

  ctx.restore();
}

function drawPixelPunk(x, y, facing, frame, showGuitar) {
  ctx.save();
  ctx.translate(x + 14, y);
  if (facing < 0) ctx.scale(-1, 1);
  ctx.translate(-14, 0);

  const walkCycle = frame % 4;
  const isMoving = Math.abs(player.vx) > 0.5 && player.onGround;
  const legOffset = isMoving ? (walkCycle < 2 ? 3 : -1) : 0;
  const armSwing = isMoving ? (walkCycle < 2 ? 2 : -2) : 0;
  const bodyBob = isMoving ? (walkCycle % 2 === 0 ? 0 : 1) : 0;
  const hairOffset = isMoving ? (walkCycle % 2 === 0 ? 0 : 1) : Math.sin(frame * 0.8) * 1;

  // Attack swing with proper guitar shape
  if (player.attacking) {
    ctx.save();
    ctx.translate(35, 22 + bodyBob);
    ctx.rotate(Math.PI);
    drawGuitarShape(0, 0, 1, player.guitarType, true, player.attackTimer);
    ctx.restore();
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(2, 42, 24, 4);

  // Legs
  ctx.fillStyle = selectedPantsColor();
  ctx.fillRect(4, 32 - legOffset, 8, 14 + legOffset);
  ctx.fillRect(16, 32 + legOffset, 8, 14 - legOffset);

  // White outline for pants
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1;
  ctx.strokeRect(3, 31 - legOffset, 10, 15 + legOffset);
  ctx.strokeRect(15, 31 + legOffset, 10, 15 - legOffset);

  // Boots
  ctx.fillStyle = '#333';
  ctx.fillRect(2, 42, 10, 4);
  ctx.fillRect(16, 42, 10, 4);

  // Body (jacket)
  ctx.fillStyle = '#111';
  ctx.fillRect(4, 14 + bodyBob, 20, 20);

  // Jacket stripes
  ctx.fillStyle = selectedShirtColor();
  ctx.fillRect(4, 18 + bodyBob, 20, 3);
  ctx.fillRect(4, 26 + bodyBob, 20, 3);

  // Shirt pattern / logo
  ctx.fillStyle = '#f0f0f0';
  switch (selectedShirtPattern()) {
    case 'misfits':
      ctx.fillRect(11, 20 + bodyBob, 6, 2);
      ctx.fillRect(10, 22 + bodyBob, 8, 2);
      ctx.fillRect(11, 24 + bodyBob, 2, 3);
      ctx.fillRect(15, 24 + bodyBob, 2, 3);
      ctx.fillRect(13, 25 + bodyBob, 2, 1);
      break;
    case 'mohawk-skull':
      ctx.fillRect(12, 20 + bodyBob, 4, 4);
      ctx.fillRect(11, 24 + bodyBob, 6, 2);
      ctx.fillRect(12, 19 + bodyBob, 1, 2);
      ctx.fillRect(14, 18 + bodyBob, 1, 3);
      ctx.fillStyle = '#111';
      ctx.fillRect(13, 21 + bodyBob, 1, 1);
      ctx.fillRect(15, 21 + bodyBob, 1, 1);
      break;
    case 'jester':
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(11, 20 + bodyBob, 2, 5);
      ctx.fillRect(15, 20 + bodyBob, 2, 5);
      ctx.fillStyle = '#ff4fd8';
      ctx.fillRect(13, 23 + bodyBob, 2, 4);
      break;
    case 'huy':
      ctx.fillStyle = '#f0f0f0';
      ctx.font = 'bold 4px Consolas, "Courier New", monospace';
      ctx.fillText('X*Y', 10, 25 + bodyBob);
      break;
    case 'punks-not-dead':
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(10, 20 + bodyBob, 8, 1);
      ctx.fillRect(10, 22 + bodyBob, 8, 1);
      ctx.fillRect(10, 24 + bodyBob, 8, 1);
      break;
  }

  // Arms
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 16 + armSwing, 5, 14);
  ctx.fillRect(23, 16 - armSwing, 5, 14);

  // Hands
  ctx.fillStyle = selectedSkinTone();
  ctx.fillRect(0, 28 + armSwing, 5, 5);
  ctx.fillRect(23, 28 - armSwing, 5, 5);

  // Head
  ctx.fillStyle = selectedSkinTone();
  ctx.fillRect(6, 2 + bodyBob, 16, 14);

  // Hair (mohawk)
  ctx.fillStyle = selectedHairColor();
  ctx.fillRect(8, -6 + hairOffset + bodyBob, 12, 10);
  // Spikes
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(7 + i * 3, -10 + hairOffset + bodyBob, 2, 5);
  }

  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(8, 6 + bodyBob, 4, 4);
  ctx.fillRect(16, 6 + bodyBob, 4, 4);
  // Eye shine
  ctx.fillStyle = '#39ff14';
  ctx.fillRect(9, 6 + bodyBob, 2, 2);
  ctx.fillRect(17, 6 + bodyBob, 2, 2);

  // Mouth
  ctx.fillStyle = '#000';
  ctx.fillRect(10, 12 + bodyBob, 8, 2);

  // Guitar in hands once equipped
  if (showGuitar && !player.attacking) {
    ctx.save();
    ctx.translate(15, 27 + bodyBob);
    ctx.rotate(Math.PI);
    ctx.scale(0.8, 0.8);
    drawGuitarShape(0, 0, 1, player.guitarType, false, 0);
    ctx.restore();
  }

  ctx.restore();
}

function drawPlatform(p) {
  const sx = p.x - camX;
  if (sx + p.w < 0 || sx > GAME_W) return;

  if (p.type === 'ground') {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(sx, p.y, p.w, 8);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx, p.y + p.h - 4, p.w, 4);
  } else if (p.shield) {
    // Rocket-blocking shield platform - glowing red hazard look with a pulsing
    // energy strip along the top so the player reads it as "cover from rockets".
    const pulse = 0.65 + 0.35 * Math.sin(Date.now() * 0.008);
    // Soft outer glow
    ctx.save();
    ctx.shadowColor = '#ff2a3a';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#6a0c12';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.restore();
    // Inner plating
    ctx.fillStyle = '#a8121c';
    ctx.fillRect(sx + 2, p.y + 2, p.w - 4, p.h - 4);
    // Hot top surface - where rockets detonate
    ctx.fillStyle = `rgba(255, ${Math.floor(60 + pulse * 90)}, ${Math.floor(60 + pulse * 30)}, 1)`;
    ctx.fillRect(sx, p.y, p.w, 4);
    // Bright highlight line
    ctx.fillStyle = 'rgba(255, 230, 180, 0.75)';
    ctx.fillRect(sx + 2, p.y + 1, p.w - 4, 1);
    // Corner rivets
    ctx.fillStyle = '#2a0408';
    ctx.fillRect(sx + 2,         p.y + p.h - 4, 2, 2);
    ctx.fillRect(sx + p.w - 4,   p.y + p.h - 4, 2, 2);
    // Animated energy chevrons across the top strip
    const chevSpan = 14;
    const t = (Date.now() * 0.12) % chevSpan;
    ctx.fillStyle = `rgba(255, 220, 120, ${0.4 + pulse * 0.4})`;
    for (let cx = sx - chevSpan + t; cx < sx + p.w; cx += chevSpan) {
      if (cx + 4 < sx || cx > sx + p.w) continue;
      const x0 = Math.max(sx, cx);
      const x1 = Math.min(sx + p.w, cx + 4);
      if (x1 > x0) ctx.fillRect(x0, p.y + 5, x1 - x0, 2);
    }
  } else {
    ctx.fillStyle = '#4a3a2a';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#6a5a4a';
    ctx.fillRect(sx + 2, p.y + 2, p.w - 4, p.h - 4);
    ctx.fillStyle = '#3a2a1a';
    ctx.fillRect(sx, p.y, p.w, 4);
  }
}

function drawCoin(c) {
  if (c.collected) return;
  const sx = c.x - camX;
  if (sx < -20 || sx > 820) return;

  if (c.golden) {
    // Golden can with pulsing glow - restores one heart.
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.006);
    ctx.save();
    ctx.shadowColor = '#ffd35a';
    ctx.shadowBlur = 8 + pulse * 6;

    ctx.fillStyle = '#ffd35a';
    ctx.fillRect(sx - 5, c.y - 16, 10, 14);

    ctx.fillStyle = '#c78a12';
    ctx.fillRect(sx - 5, c.y - 16, 10, 2);
    ctx.fillRect(sx - 5, c.y - 4, 10, 2);
    ctx.fillRect(sx - 4, c.y - 11, 8, 4);

    ctx.fillStyle = '#fff0a8';
    ctx.fillRect(sx - 5, c.y - 18, 10, 2);

    ctx.fillStyle = '#c78a12';
    ctx.beginPath();
    ctx.ellipse(sx, c.y - 16, 5, 1.2, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    ctx.fillRect(sx - 3.5, c.y - 13, 2, 8);

    // Heart icon in center
    ctx.fillStyle = '#ff3b5c';
    ctx.fillRect(sx - 3, c.y - 10, 2, 2);
    ctx.fillRect(sx + 1, c.y - 10, 2, 2);
    ctx.fillRect(sx - 3, c.y - 9, 6, 2);
    ctx.fillRect(sx - 2, c.y - 7, 4, 2);
    ctx.fillRect(sx - 1, c.y - 5, 2, 1);

    ctx.restore();
    return;
  }

  // Beer can - white body with red bands and center label
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(sx - 5, c.y - 16, 10, 14);

  ctx.fillStyle = '#d92b2b';
  ctx.fillRect(sx - 5, c.y - 16, 10, 2);
  ctx.fillRect(sx - 5, c.y - 4, 10, 2);
  ctx.fillRect(sx - 4, c.y - 11, 8, 4);

  ctx.fillStyle = '#d0d0d0';
  ctx.fillRect(sx - 5, c.y - 18, 10, 2);

  ctx.fillStyle = '#b0b0b0';
  ctx.beginPath();
  ctx.ellipse(sx, c.y - 16, 5, 1.2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
  ctx.fillRect(sx - 3.5, c.y - 13, 2, 8);

  ctx.fillStyle = '#ffff99';
  ctx.beginPath();
  ctx.arc(sx + 4, c.y - 10, 1, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(e) {
  if (!e.alive) return;
  if (e.type === 'dasher' && !e.active) return;
  const sx = e.x - camX;
  if (sx < -80 || sx > 880) return;

  if (e.type === 'flyer') {
    drawBat(sx, e.y);
    return;
  }
  if (e.type === 'brute') {
    drawBrute(sx, e.y, e);
    return;
  }
  if (e.type === 'rat') {
    drawRat(sx, e.y, e);
    return;
  }
  if (e.type === 'dasher') {
    drawDasher(sx, e.y, e);
    return;
  }
  if (e.type === 'drone') {
    drawDrone(sx, e.y, e);
    return;
  }
  if (e.type === 'soldier') {
    drawCyberSoldier(sx, e.y, e);
    return;
  }
  if (e.type === 'bigbot') {
    drawBigBot(sx, e.y, e);
    return;
  }
  if (e.type === 'boss') {
    drawBoss(sx, e.y, e);
    return;
  }

  ctx.fillStyle = '#ff3333';
  ctx.fillRect(sx - 12, e.y - 28, 24, 24);
  ctx.fillStyle = '#aa0000';
  ctx.fillRect(sx - 14, e.y - 30, 28, 28);

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx - 8, e.y - 22, 6, 6);
  ctx.fillRect(sx + 2, e.y - 22, 6, 6);
  ctx.fillStyle = '#000';
  ctx.fillRect(sx - 6, e.y - 20, 3, 3);
  ctx.fillRect(sx + 4, e.y - 20, 3, 3);

  // Antenna
  ctx.fillStyle = '#ff3333';
  ctx.fillRect(sx - 1, e.y - 38, 2, 10);
  ctx.fillStyle = '#ffff00';
  ctx.fillRect(sx - 3, e.y - 40, 6, 6);
}

function drawBrute(sx, y, e) {
  const flash = e.hitFlash > 0;
  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 2, 22, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // Main rusted body - outer shell
  ctx.fillStyle = flash ? '#ffe8a0' : '#4a2a18';
  ctx.fillRect(sx - 20, y - 40, 40, 40);
  // Inner body
  ctx.fillStyle = flash ? '#ffd060' : '#6b3a22';
  ctx.fillRect(sx - 18, y - 38, 36, 36);
  // Rust patches
  ctx.fillStyle = flash ? '#ffaa44' : '#8a4520';
  ctx.fillRect(sx - 14, y - 30, 6, 6);
  ctx.fillRect(sx + 6,  y - 22, 8, 8);
  ctx.fillRect(sx - 10, y - 12, 10, 4);
  // Bolts
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(sx - 18, y - 38, 3, 3);
  ctx.fillRect(sx + 15, y - 38, 3, 3);
  ctx.fillRect(sx - 18, y - 5,  3, 3);
  ctx.fillRect(sx + 15, y - 5,  3, 3);
  // Top spikes (stomp deterrent)
  ctx.fillStyle = '#2a1a12';
  for (let i = -2; i <= 2; i++) {
    const sxi = sx + i * 7;
    ctx.beginPath();
    ctx.moveTo(sxi - 3, y - 40);
    ctx.lineTo(sxi,     y - 48);
    ctx.lineTo(sxi + 3, y - 40);
    ctx.closePath();
    ctx.fill();
  }
  // Glowing eyes
  ctx.fillStyle = flash ? '#ffffff' : '#7cff50';
  ctx.fillRect(sx - 10, y - 30, 5, 5);
  ctx.fillRect(sx + 5,  y - 30, 5, 5);
  // Eye glow
  ctx.fillStyle = 'rgba(124, 255, 80, 0.35)';
  ctx.fillRect(sx - 12, y - 32, 9, 9);
  ctx.fillRect(sx + 3,  y - 32, 9, 9);
  // Mouth grill
  ctx.fillStyle = '#1a0e08';
  ctx.fillRect(sx - 10, y - 16, 20, 6);
  ctx.fillStyle = '#4a2e1a';
  for (let gx = sx - 9; gx < sx + 10; gx += 3) ctx.fillRect(gx, y - 16, 1, 6);
  // HP bar above head
  const hpRatio = Math.max(0, e.hp / e.maxHp);
  ctx.fillStyle = '#220808';
  ctx.fillRect(sx - 18, y - 56, 36, 4);
  ctx.fillStyle = hpRatio > 0.5 ? '#7cff50' : (hpRatio > 0.25 ? '#ffcc00' : '#ff3333');
  ctx.fillRect(sx - 18, y - 56, 36 * hpRatio, 4);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(sx - 18.5, y - 56.5, 37, 5);
  ctx.restore();
}

function drawBat(sx, y) {
  const flap = Math.sin(Date.now() * 0.018) * 4;
  ctx.save();
  // Wings
  ctx.fillStyle = '#2a0a35';
  ctx.beginPath();
  ctx.moveTo(sx - 6, y - 18);
  ctx.lineTo(sx - 22, y - 22 + flap);
  ctx.lineTo(sx - 18, y - 12 + flap);
  ctx.lineTo(sx - 6, y - 10);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sx + 6, y - 18);
  ctx.lineTo(sx + 22, y - 22 + flap);
  ctx.lineTo(sx + 18, y - 12 + flap);
  ctx.lineTo(sx + 6, y - 10);
  ctx.closePath();
  ctx.fill();
  // Body
  ctx.fillStyle = '#4a1a55';
  ctx.fillRect(sx - 7, y - 22, 14, 14);
  // Head
  ctx.fillStyle = '#3a1045';
  ctx.fillRect(sx - 5, y - 28, 10, 8);
  // Ears
  ctx.beginPath();
  ctx.moveTo(sx - 5, y - 28);
  ctx.lineTo(sx - 7, y - 33);
  ctx.lineTo(sx - 2, y - 28);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(sx + 5, y - 28);
  ctx.lineTo(sx + 7, y - 33);
  ctx.lineTo(sx + 2, y - 28);
  ctx.closePath();
  ctx.fill();
  // Glowing eyes
  ctx.fillStyle = '#ff3b3b';
  ctx.fillRect(sx - 3, y - 25, 2, 2);
  ctx.fillRect(sx + 1, y - 25, 2, 2);
  // Fang
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx - 1, y - 22, 1, 2);
  ctx.fillRect(sx + 1, y - 22, 1, 2);
  ctx.restore();
}

function drawRat(sx, y, e) {
  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(sx, y, 14, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Direction based on velocity
  const dir = e.vx < 0 ? -1 : 1;
  // Body
  ctx.fillStyle = '#4a3a30';
  ctx.fillRect(sx - 12, y - 14, 24, 12);
  // Belly
  ctx.fillStyle = '#6a5a48';
  ctx.fillRect(sx - 10, y - 10, 20, 6);
  // Head
  ctx.fillStyle = '#3a2a22';
  ctx.fillRect(sx + dir * 8, y - 16, 8, 8);
  // Ears
  ctx.fillStyle = '#2a1a14';
  ctx.fillRect(sx + dir * 8, y - 18, 3, 3);
  ctx.fillRect(sx + dir * 13, y - 18, 3, 3);
  // Inner ear
  ctx.fillStyle = '#8a5a6a';
  ctx.fillRect(sx + dir * 9, y - 17, 1, 1);
  ctx.fillRect(sx + dir * 14, y - 17, 1, 1);
  // Eye (red, glowing)
  ctx.fillStyle = '#ff3030';
  ctx.fillRect(sx + dir * 12, y - 13, 2, 2);
  ctx.fillStyle = 'rgba(255,60,60,0.4)';
  ctx.fillRect(sx + dir * 11, y - 14, 4, 4);
  // Snout + teeth
  ctx.fillStyle = '#c8b0a0';
  ctx.fillRect(sx + dir * 16, y - 10, 2, 3);
  ctx.fillStyle = '#fff';
  ctx.fillRect(sx + dir * 16, y - 8, 1, 2);
  // Legs
  ctx.fillStyle = '#2a1a12';
  ctx.fillRect(sx - 10, y - 4, 3, 4);
  ctx.fillRect(sx + 7,  y - 4, 3, 4);
  // Tail (wavy)
  ctx.strokeStyle = '#8a6a50';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const tailStart = sx - dir * 12;
  ctx.moveTo(tailStart, y - 10);
  ctx.quadraticCurveTo(tailStart - dir * 10, y - 18, tailStart - dir * 18, y - 8);
  ctx.stroke();
  ctx.restore();
}

function drawDasher(sx, y, e) {
  // Giant sewer rat sprinting across the screen. Armored: immune to guitar hits.
  const dir = e.vx >= 0 ? 1 : -1;
  ctx.save();

  // Motion-blur streaks behind the rat
  for (let i = 1; i <= 5; i++) {
    ctx.globalAlpha = 0.22 - i * 0.035;
    ctx.fillStyle = '#3a2a22';
    ctx.fillRect(sx - dir * (30 + i * 10), y - 24, 26, 18);
  }
  ctx.globalAlpha = 1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.ellipse(sx, y + 2, 34, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Running leg animation (two-frame gallop)
  const legCycle = Math.floor(Date.now() * 0.03) % 2;
  const legFrontA = legCycle === 0 ? 6 : 2;
  const legFrontB = legCycle === 0 ? 2 : 6;

  // Back legs
  ctx.fillStyle = '#1e140e';
  ctx.fillRect(sx - dir * 22, y - 4, 4, legFrontA);
  ctx.fillRect(sx - dir * 16, y - 4, 4, legFrontB);
  // Front legs
  ctx.fillRect(sx + dir * 16, y - 4, 4, legFrontB);
  ctx.fillRect(sx + dir * 22, y - 4, 4, legFrontA);

  // Body - main dark fur
  ctx.fillStyle = '#3a2a20';
  ctx.fillRect(sx - 28, y - 22, 56, 20);
  // Belly highlight
  ctx.fillStyle = '#5a4a3a';
  ctx.fillRect(sx - 24, y - 12, 48, 8);
  // Fur shading along top
  ctx.fillStyle = '#1e140e';
  ctx.fillRect(sx - 26, y - 22, 52, 4);
  // Hunched back hump
  ctx.fillStyle = '#2a1e14';
  ctx.fillRect(sx - 8, y - 26, 18, 6);

  // Fur tufts
  ctx.fillStyle = '#4a382a';
  for (let i = 0; i < 6; i++) {
    ctx.fillRect(sx - 22 + i * 9, y - 18 - (i % 2) * 2, 2, 2);
  }

  // Head (at the front, extended forward)
  const hx = sx + dir * 28;
  ctx.fillStyle = '#2e2018';
  ctx.fillRect(hx, y - 22, dir * 18, 16);
  // Normalize head rect for further drawing
  const headX = dir > 0 ? hx : hx + dir * 18;
  const headW = 18;
  // Snout
  ctx.fillStyle = '#1a1208';
  ctx.fillRect(headX + (dir > 0 ? headW : -6), y - 14, 6, 6);
  // Nose
  ctx.fillStyle = '#ff6080';
  ctx.fillRect(headX + (dir > 0 ? headW + 4 : -6), y - 12, 2, 2);
  // Ears (big pointy)
  ctx.fillStyle = '#2a1a12';
  ctx.beginPath();
  ctx.moveTo(headX + 4, y - 22);
  ctx.lineTo(headX + 8, y - 32);
  ctx.lineTo(headX + 12, y - 22);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX + headW - 12, y - 22);
  ctx.lineTo(headX + headW - 8, y - 32);
  ctx.lineTo(headX + headW - 4, y - 22);
  ctx.closePath();
  ctx.fill();
  // Inner ear
  ctx.fillStyle = '#8a3a50';
  ctx.fillRect(headX + 7,         y - 26, 2, 2);
  ctx.fillRect(headX + headW - 9, y - 26, 2, 2);

  // Glowing red eye
  ctx.fillStyle = 'rgba(255, 40, 40, 0.35)';
  ctx.fillRect(headX + (dir > 0 ? headW - 7 : 2), y - 19, 6, 5);
  ctx.fillStyle = '#ff2020';
  ctx.fillRect(headX + (dir > 0 ? headW - 6 : 3), y - 18, 4, 3);
  ctx.fillStyle = '#ffff80';
  ctx.fillRect(headX + (dir > 0 ? headW - 5 : 4), y - 18, 1, 1);

  // Fangs (white)
  ctx.fillStyle = '#fff';
  ctx.fillRect(headX + (dir > 0 ? headW + 1 : -2), y - 9, 1, 3);
  ctx.fillRect(headX + (dir > 0 ? headW + 3 : -4), y - 9, 1, 3);

  // Long whippy tail (behind)
  const tailWave = Math.sin(Date.now() * 0.02) * 6;
  ctx.strokeStyle = '#8a6a50';
  ctx.lineWidth = 3;
  ctx.beginPath();
  const tx0 = sx - dir * 28;
  ctx.moveTo(tx0, y - 14);
  ctx.quadraticCurveTo(tx0 - dir * 16, y - 22 + tailWave, tx0 - dir * 34, y - 10 - tailWave);
  ctx.stroke();
  // Tail segments
  ctx.strokeStyle = '#6a4e38';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tx0 - dir * 6,  y - 18 + tailWave * 0.4);
  ctx.lineTo(tx0 - dir * 20, y - 20 + tailWave * 0.8);
  ctx.stroke();

  ctx.restore();
}

// Small HP pip row shared by the new cyber-city enemies.
function drawEnemyHpBar(cx, topY, w, hp, maxHp) {
  if (hp >= maxHp) return;
  const h = 3;
  const y = topY - 8;
  const x = cx - w / 2;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = '#3a0a12';
  ctx.fillRect(x, y, w, h);
  const ratio = Math.max(0, hp / maxHp);
  ctx.fillStyle = ratio > 0.5 ? '#39ff14' : (ratio > 0.25 ? '#ffcc00' : '#ff4040');
  ctx.fillRect(x, y, Math.round(w * ratio), h);
}

function drawDrone(sx, y, e) {
  const flash = e.hitFlash > 0;
  const now = Date.now() * 0.01;
  ctx.save();

  // Hovering shadow below (based on vertical position)
  const groundY = 448;
  const shadowAlpha = Math.max(0.05, 0.35 - (groundY - y) / 1200);
  const shadowW = 18 + (groundY - y) / 40;
  ctx.fillStyle = `rgba(0, 220, 255, ${shadowAlpha})`;
  ctx.beginPath();
  ctx.ellipse(sx, groundY - 2, shadowW, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rotor blur (twin rotors top-left / top-right)
  ctx.fillStyle = 'rgba(180, 240, 255, 0.5)';
  const rotorW = 14 + Math.sin(now * 3) * 2;
  ctx.fillRect(sx - 22, y - 22, rotorW, 2);
  ctx.fillRect(sx + 22 - rotorW, y - 22, rotorW, 2);

  // Arms
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(sx - 20, y - 20, 14, 2);
  ctx.fillRect(sx + 6,  y - 20, 14, 2);

  // Main chassis
  const bodyColor = flash ? '#ffffff' : '#1a2838';
  ctx.fillStyle = bodyColor;
  ctx.fillRect(sx - 12, y - 18, 24, 14);
  // Lower half
  ctx.fillStyle = flash ? '#ffffff' : '#0f1a26';
  ctx.fillRect(sx - 10, y - 6, 20, 4);

  // Neon cyan trim
  ctx.fillStyle = flash ? '#ffffff' : '#00f0ff';
  ctx.fillRect(sx - 12, y - 8, 24, 1);
  ctx.fillRect(sx - 12, y - 19, 24, 1);

  // Camera eye (pulsing)
  const pulse = 0.7 + 0.3 * Math.sin(now * 2);
  ctx.fillStyle = flash ? '#ffffff' : `rgba(255, 40, 120, ${pulse})`;
  ctx.fillRect(sx - 4, y - 15, 8, 5);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(sx - 2, y - 14, 2, 2);

  // Antenna with blinking red tip
  ctx.fillStyle = '#2a2a3a';
  ctx.fillRect(sx - 1, y - 26, 2, 8);
  ctx.fillStyle = (Math.floor(now * 3) % 2) ? '#ff3333' : '#660000';
  ctx.fillRect(sx - 2, y - 28, 4, 3);

  // Rotor hubs
  ctx.fillStyle = '#555';
  ctx.fillRect(sx - 16, y - 23, 4, 3);
  ctx.fillRect(sx + 12, y - 23, 4, 3);

  ctx.restore();
  drawEnemyHpBar(sx, y - 26, 28, e.hp, e.maxHp);
}
