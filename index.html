    ];
    const labelX = 180;
    const valueX = 520;
    let rowY = 244;
    for (const [label, value, color] of rows) {
      ctx.fillStyle = '#d9d1f8';
      ctx.fillText(label, labelX, rowY);
      ctx.fillStyle = color;
      ctx.fillText(value, valueX - ctx.measureText(value).width, rowY);
      rowY += 24;
    }

    // Continue hint - blinking
    const blinkAlpha = 0.45 + 0.45 * Math.abs(Math.sin(Date.now() * 0.004));
    ctx.fillStyle = `rgba(57, 255, 20, ${blinkAlpha})`;
    ctx.font = 'bold 14px Consolas, "Courier New", monospace';
    const hint = 'PRESS  SPACE / ENTER / A  TO RETURN TO MENU';
    ctx.fillText(hint, centerX - ctx.measureText(hint).width / 2, 416);

    popUITransform();
    return;
  }

  // Game
  drawBackground();
  platforms.forEach(drawPlatform);
  // Hide the goal flag during the boss fight - there is no flag, just the arena.
  if (!bossActive) drawFlag();
  beerCans.forEach(drawCoin);
  drawRewardPickups();
  enemies.forEach(drawEnemy);
  drawPoisonHazards();
  drawBossProjectiles();

  // Stage-light spotlight on the hero during the outro performance. Drawn BEHIND
  // the player sprite so the sprite reads crisp against a glowing halo.
  if (performanceActive) drawPerformanceSpotlight();

  // Pedal shockwaves drawn behind the sprite so the hero stays legible on top.
  drawPedalShockwaves();

  const blink = player.invincible && Math.floor(player.invincibleTimer / 6) % 2 === 0;
  if (!blink) drawPixelPunk(player.x - camX, player.y, player.facing, player.animFrame, player.hasGuitar);

  // Pedal chassis + stomping boot overlay drawn OVER the sprite so the hero
  // visibly appears to press the pedal under themselves.
  drawPedalUnderPlayer();

  // Fireworks / sparkle particles sprayed over the hero during the solo.
  if (performanceActive) drawPerformanceSparks();

  pushUITransform();
  if (bossActive) drawBossHPBar();
  if (performanceActive) drawPerformanceBanner();
  drawHUD();
  if (gameState === 'paused') drawPauseOverlay();
  popUITransform();
}

// ---- Performance outro visuals ----
function drawPerformanceSpotlight() {
  const cx = player.x + player.w / 2 - camX;
  const cy = player.y + player.h / 2;
  const t = 1 - performanceTimer / PERFORMANCE_DURATION; // 0 -> 1 across outro
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.012);

  // Soft circular halo behind the hero.
  const haloR = 140 + pulse * 18;
  const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, haloR);
  grad.addColorStop(0, 'rgba(255, 230, 160, 0.55)');
  grad.addColorStop(0.4, 'rgba(255, 120, 200, 0.35)');
  grad.addColorStop(1, 'rgba(255, 80, 180, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, haloR, 0, Math.PI * 2);
  ctx.fill();

  // Twin stage-light cones coming from the ceiling corners - sweep slightly.
  const sweep = Math.sin(Date.now() * 0.002) * 40;
  drawStageLightCone(80,  0, cx + sweep, cy, 'rgba(255, 80, 210, 0.18)');
  drawStageLightCone(720, 0, cx - sweep, cy, 'rgba(90, 220, 255, 0.18)');

  // Ground glow disk.
  ctx.fillStyle = `rgba(255, 160, 60, ${0.28 + pulse * 0.18})`;
  ctx.beginPath();
  ctx.ellipse(cx, player.y + player.h, 80, 14, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawStageLightCone(sx, sy, tx, ty, color) {
  const dx = tx - sx;
  const dy = ty - sy;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < 1) return;
  const nx = -dy / len;
  const ny =  dx / len;
  const spread = 50;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.lineTo(tx + nx * spread, ty + ny * spread);
  ctx.lineTo(tx - nx * spread, ty - ny * spread);
  ctx.closePath();
  ctx.fill();
}

// Persistent spark buffer so we can fade them out gradually.
const performanceSparks = [];
function drawPerformanceSparks() {
  // Spawn new sparks every few frames when the hero is shredding.
  if (player.attacking && Math.random() < 0.55) {
    const cx = player.x + player.w / 2 - camX + (Math.random() - 0.5) * 30;
    const cy = player.y + 14 + Math.random() * 22;
    performanceSparks.push({
      x: cx,
      y: cy,
      vx: (Math.random() - 0.5) * 3.5,
      vy: -2 - Math.random() * 3,
      life: 40,
      maxLife: 40,
      hue: Math.random() < 0.5 ? '#ffee66' : (Math.random() < 0.5 ? '#ff4fd8' : '#39ff14'),
    });
  }
  // Occasionally launch firework bursts from random stage positions.
  if (Math.random() < 0.04) {
    const fx = 80 + Math.random() * (GAME_W - 160);
    const fy = 60 + Math.random() * 160;
    for (let k = 0; k < 14; k++) {
      const a = (k / 14) * Math.PI * 2;
      performanceSparks.push({
        x: fx,
        y: fy,
        vx: Math.cos(a) * (2 + Math.random() * 1.5),
        vy: Math.sin(a) * (2 + Math.random() * 1.5),
        life: 36,
        maxLife: 36,
        hue: ['#ff4fd8', '#ffee66', '#39ff14', '#6fdfff'][Math.floor(Math.random() * 4)],
      });
    }
  }
  // Update + draw
  for (let i = performanceSparks.length - 1; i >= 0; i--) {
    const s = performanceSparks[i];
    s.x += s.vx;
    s.y += s.vy;
    s.vy += 0.12;
    s.life--;
    if (s.life <= 0) { performanceSparks.splice(i, 1); continue; }
    const alpha = s.life / s.maxLife;
    ctx.fillStyle = s.hue;
    ctx.globalAlpha = alpha;
    ctx.fillRect(s.x - 1.5, s.y - 1.5, 3, 3);
    ctx.globalAlpha = 1;
  }
}

function drawPerformanceBanner() {
  // Pulsing "FINAL SOLO" banner across the top of the screen.
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.008);
  const bannerY = 88;
  const bannerH = 40;
  const bannerW = 420;
  const bannerX = (UI_W - bannerW) / 2;
  ctx.fillStyle = 'rgba(14, 6, 22, 0.92)';
  ctx.fillRect(bannerX, bannerY, bannerW, bannerH);
  ctx.strokeStyle = '#ff2aa0';
  ctx.lineWidth = 2;
  ctx.strokeRect(bannerX, bannerY, bannerW, bannerH);
  ctx.lineWidth = 1;

  ctx.save();
  ctx.shadowColor = '#ff2aa0';
  ctx.shadowBlur = 14 * pulse;
  ctx.fillStyle = '#ffee66';
  ctx.font = 'bold 22px Consolas, "Courier New", monospace';
  const label = '* FINAL SOLO *';
  ctx.fillText(label, (UI_W - ctx.measureText(label).width) / 2, bannerY + 28);
  ctx.restore();
}

function drawPauseOverlay() {
  // Dim the gameplay behind the menu.
  ctx.fillStyle = 'rgba(6, 6, 12, 0.72)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);

  const panelW = 360;
  const panelH = 260;
  const panelX = (GAME_W - panelW) / 2;
  const panelY = (GAME_H - panelH) / 2;
  drawRoundedRect(panelX, panelY, panelW, panelH, 14, 'rgba(14, 12, 22, 0.96)', UI.primary);

  ctx.fillStyle = UI.primary;
  ctx.font = 'bold 28px Consolas, "Courier New", monospace';
  const title = 'PAUSED';
  ctx.fillText(title, (GAME_W - ctx.measureText(title).width) / 2, panelY + 54);

  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 10px Consolas, "Courier New", monospace';
  const sub = 'ESC / START  TO RESUME';
  ctx.fillText(sub, (GAME_W - ctx.measureText(sub).width) / 2, panelY + 74);

  const labels = ['RESUME', 'SETTINGS', 'EXIT TO MENU'];
  const itemW = 280;
  const itemH = 38;
  const itemX = (GAME_W - itemW) / 2;
  const startY = panelY + 100;

  for (let i = 0; i < labels.length; i++) {
    const y = startY + i * (itemH + 10);
    const selected = pauseSelection === i;
    const isExit = i === 2;
    const border = selected ? (isExit ? UI.danger : UI.primary) : UI.border;
    const fill = selected
      ? (isExit ? 'rgba(255, 51, 51, 0.16)' : 'rgba(57, 255, 20, 0.14)')
      : 'rgba(18, 16, 28, 0.94)';
    drawPanel(itemX, y, itemW, itemH, border, fill);

    addInteractiveRegion(itemX, y, itemW, itemH, () => {
      pauseSelection = i;
      if (i === 0) gameState = 'playing';
      else if (i === 1) {
        gameState = 'settings';
        settingsReturnTo = 'paused';
        settingsSelection = 0;
        characterProfile.pendingResolutionIndex = characterProfile.resolutionIndex;
      } else {
        if (bgGain) stopBackgroundMusic();
        lives = 3;
        score = 0;
        levelDeathCount = 0;
        lastCompletedLevel = 0;
        currentLevel = 1;
        gameState = 'start';
        creatorSelection = 7;
      }
    }, () => {
      pauseSelection = i;
    });

    ctx.fillStyle = selected ? (isExit ? UI.danger : UI.primary) : UI.textDim;
    ctx.font = 'bold 16px Consolas, "Courier New", monospace';
    const tw = ctx.measureText(labels[i]).width;
    ctx.fillText(labels[i], (GAME_W - tw) / 2, y + 25);
  }

  ctx.fillStyle = UI.textDim;
  ctx.font = 'bold 9px Consolas, "Courier New", monospace';
  const hint = 'UP / DOWN NAVIGATE   //   E / ENTER / A SELECT';
  ctx.fillText(hint, (GAME_W - ctx.measureText(hint).width) / 2, panelY + panelH - 18);
}

// ---- Game Loop ----
let lastTime = 0;
function loop(time) {
  pollGamepad();
  update();
  handleGameStateTransitions();
  draw();
  requestAnimationFrame(loop);
}

// ---- Start / Restart ----
function startGame() {
  score = 0;
  lives = 3;
  // Clear boss-fight state - a fresh run always starts on a normal level.
  bossActive = false;
  bossOutroTimer = 0;
  bossProjectiles.length = 0;
  boss = null;
  performanceActive = false;
  performanceTimer = 0;
  player.performing = false;
  // Start a brand-new playthrough timer / counters when launching from level 1.
  if (currentLevel === 1) {
    runStartMs = Date.now();
    runEndMs = 0;
    enemiesKilled = 0;
    beerCollected = 0;
    moneySpent = 0;
    // Reward-gated consumables (pedals / bonus hearts) only persist within a
    // single playthrough - a fresh run starts with the defaults.
    player.pedalCharges = 0;
    player.pedalActive = false;
    player.pedalTimer = 0;
    player.pedalCooldown = 0;
  }
  resetPlayer();
  buildLevel();
  camX = 0;
  shopCol = 0;
  shopRow = 0;

  // Equip logic: respect the guitar the player explicitly selected/bought in the shop.
  // Only auto-pick the best guitar if the player hasn't chosen one yet (or the chosen
  // one is somehow no longer owned, e.g. after a game reset).
  if (ownedGuitars.length > 0) {
    player.hasGuitar = true;
    if (!ownedGuitars.includes(player.guitarType)) {
      // Fall back to the strongest owned guitar.
      let bestIdx = ownedGuitars[0];
      for (const idx of ownedGuitars) {
        if (guitarTypes[idx].damage > guitarTypes[bestIdx].damage ||
            (guitarTypes[idx].damage === guitarTypes[bestIdx].damage && idx > bestIdx)) {
          bestIdx = idx;
        }
      }
      player.guitarType = bestIdx;
    }
  } else {
    player.hasGuitar = false;
  }

  gameState = 'playing';
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// If a previous playthrough has beaten the final boss, unlock the DIY Punk
// Guitar in the shop for this (repeat) run.
if (bossBeatenEver) unlockDiyPunkGuitar();

buildLevel();
requestAnimationFrame(loop);
</script>
